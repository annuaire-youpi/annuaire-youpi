<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Annuaire YOUPI® — Chargement…</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;text-align:center}
  .box{background:white;padding:40px 32px;border-radius:14px;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
  h1{color:#1e3a8a;font-size:22px;margin:0 0 8px 0}
  p{color:#64748b;font-size:14px;line-height:1.6;margin:0 0 18px 0}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#2563eb}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1>Annuaire YOUPI<sup>®</sup></h1>
  <p>Chargement de la fiche en cours…</p>
  <p style="font-size:12px;color:#94a3b8">Si rien ne se passe d'ici quelques secondes, <a href="/">cliquez ici pour revenir à l'accueil</a>.</p>
</div>
<script>
// ============================================================
// Redirection SPA pour GitHub Pages (v2.11.1)
// ============================================================
// GitHub Pages sert ce fichier quand l'utilisateur visite un path
// qui n'existe pas sur le serveur (ex. /le-ti-punch-fdf).
//
// Logique simplifiée pour site "user" GitHub Pages :
//  - L'URL est toujours annuaire-youpi.github.io/<quelque-chose>
//  - Le path est donc TOUJOURS de la forme /<slug> sans préfixe de repo
//  - On prend le 1er segment comme slug candidat
//  - On exclut les noms réservés (annuaire-youpi, index, 404, admin, api)
//  - On valide qu'il ressemble à un slug d'entreprise
//
(function() {
  try {
    var path = window.location.pathname || '';
    var parts = path.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);

    if (parts.length === 0) {
      // Pas de slug → retour à la racine
      window.location.replace('/');
      return;
    }

    // On prend TOUJOURS le 1er segment comme slug candidat
    // (pas de préfixe de repo, c'est un site user GH Pages)
    var slug = parts[0];

    // Noms réservés à exclure (pour ne pas confondre avec un slug d'entreprise)
    var reserved = [
      'annuaire-youpi', 'index.html', 'index', '404', '404.html',
      'admin', 'api', 'login', 'register', 'home', 'changelog'
    ];
    if (reserved.indexOf(slug) !== -1) {
      window.location.replace('/');
      return;
    }

    // Validation : un slug d'entreprise valide n'est composé que de minuscules,
    // chiffres et tirets (entre 2 et 80 chars)
    if (!/^[a-z0-9-]{2,80}$/.test(slug)) {
      window.location.replace('/');
      return;
    }

    // Reconstitue l'URL cible : on garde le hash si présent
    var hash = window.location.hash || '';
    window.location.replace('/?slug=' + encodeURIComponent(slug) + hash);
  } catch (err) {
    // En cas de problème, retour à l'accueil
    window.location.replace('/');
  }
})();
</script>
</body>
</html>
