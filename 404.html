<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Annuaire YOUPI® — Chargement…</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;text-align:center}
  .box{background:white;padding:40px 32px;border-radius:14px;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
  h1{color:#1e3a8a;font-size:22px;margin:0 0 8px 0}
  p{color:#64748b;font-size:14px;line-height:1.6;margin:0 0 18px 0}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#2563eb}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1>Annuaire YOUPI<sup>®</sup></h1>
  <p>Chargement de la fiche en cours…</p>
  <p style="font-size:12px;color:#94a3b8">Si rien ne se passe d'ici quelques secondes, <a href="/">cliquez ici pour revenir à l'accueil</a>.</p>
</div>
<script>
// ============================================================
// Redirection SPA pour GitHub Pages (v2.11.0)
// ============================================================
// GitHub Pages sert ce fichier quand l'utilisateur visite un path
// qui n'existe pas sur le serveur (ex. /le-ti-punch-fdf).
// On extrait le dernier segment du path comme slug et on redirige
// vers la racine avec ?slug=... que la SPA interprétera correctement.
//
// On préserve aussi le hash et les autres query params.
(function() {
  try {
    var path = window.location.pathname || '';
    // Retire les / en début/fin et split
    var parts = path.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);

    // Détection du préfixe GH Pages projet :
    // si le repo s'appelle "annuaire-youpi", le path peut être
    // "/annuaire-youpi/le-ti-punch-fdf". Dans ce cas on garde le préfixe
    // et on récupère le dernier segment comme slug.
    var repoPrefix = '';
    var slug = '';

    if (parts.length === 0) {
      // Pas de slug → retour à la racine
      window.location.replace('/');
      return;
    }

    if (parts.length === 1) {
      // Soit "/repo/" (cas custom domain → repoPrefix vide, slug = repo) — rare
      // Soit "/slug" (cas custom domain → slug direct)
      slug = parts[0];
    } else {
      // "/repo/slug" → préfixe + slug
      repoPrefix = parts[0];
      slug = parts[parts.length - 1];
    }

    // Validation : un slug d'entreprise valide n'est composé que de minuscules,
    // chiffres et tirets (entre 2 et 80 chars)
    if (!/^[a-z0-9-]{2,80}$/.test(slug)) {
      window.location.replace('/' + (repoPrefix ? repoPrefix + '/' : ''));
      return;
    }

    // Reconstitue l'URL cible
    var baseUrl = '/' + (repoPrefix ? repoPrefix + '/' : '');
    var hash = window.location.hash || '';
    window.location.replace(baseUrl + '?slug=' + encodeURIComponent(slug) + hash);
  } catch (err) {
    // En cas de problème, retour à l'accueil
    window.location.replace('/');
  }
})();
</script>
</body>
</html>
