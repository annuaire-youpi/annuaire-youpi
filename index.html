<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="YOUPI® — L'annuaire intelligent qui trouve les meilleures entreprises locales grâce à l'IA." />
  <title>YOUPI® — Annuaire intelligent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f766e'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='sans-serif' font-size='52' font-weight='800' fill='%23f5e6d3'%3EY%3C/text%3E%3C/svg%3E" />

  <style>
    /* ============================================================
       YOUPI® — design tokens
       Palette teal + sable, look SaaS soigné, mobile-first
       ============================================================ */
    :root {
      --teal-50:  #f0fdfa;
      --teal-100: #ccfbf1;
      --teal-500: #14b8a6;
      --teal-600: #0d9488;
      --teal-700: #0f766e;
      --teal-800: #115e59;
      --teal-900: #134e4a;

      --sand-50:  #fdfbf7;
      --sand-100: #faf3e7;
      --sand-200: #f5e6d3;
      --sand-300: #e8d3b3;
      --sand-400: #d4b88a;

      --bg:        #fafaf9;
      --card:      #ffffff;
      --border:    #e7e5e4;
      --border-2:  #d6d3d1;
      --text:      #1c1917;
      --text-2:    #57534e;
      --muted:     #a8a29e;

      --success:   #16a34a;
      --warning:   #ea580c;
      --error:     #dc2626;
      --info:      #2563eb;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 16px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --shadow:    0 2px 12px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.10);

      --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
      --font-display: 'Fraunces', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: var(--teal-700); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    input, select, textarea {
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 10px 12px;
      width: 100%;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--teal-600);
      box-shadow: 0 0 0 3px var(--teal-100);
    }
    textarea { resize: vertical; min-height: 90px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    label .req { color: var(--error); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ============================================================
       Boutons
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      transition: all .15s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--teal-700);
      color: #fff;
    }
    .btn-primary:hover { background: var(--teal-800); transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border-2);
    }
    .btn-secondary:hover { background: var(--sand-50); border-color: var(--teal-600); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
    }
    .btn-ghost:hover { background: var(--sand-100); color: var(--text); }
    .btn-danger {
      background: var(--error);
      color: #fff;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-block { width: 100%; }
    .btn-lg { padding: 14px 24px; font-size: 16px; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    /* ============================================================
       Layout
       ============================================================ */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,.92);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--teal-800);
      letter-spacing: -.5px;
    }
    .brand-logo {
      width: 32px; height: 32px;
      background: var(--teal-700);
      color: var(--sand-200);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-family: var(--font-sans);
      font-size: 16px;
    }
    .brand-r { font-size: 12px; color: var(--teal-600); margin-left: 2px; }

    .header-nav {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
    .container-narrow { max-width: 640px; margin: 0 auto; }

    /* ============================================================
       Cards
       ============================================================ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .card + .card { margin-top: 16px; }
    .card h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card .subtitle {
      color: var(--text-2);
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ============================================================
       Hero / accueil
       ============================================================ */
    .hero {
      position: relative;
      padding: 64px 20px 56px;
      text-align: center;
      background: linear-gradient(180deg, var(--sand-50) 0%, var(--bg) 100%);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -100px; right: -120px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--teal-100) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -100px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, var(--sand-200) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      opacity: .6;
    }
    .hero-inner { position: relative; max-width: 760px; margin: 0 auto; }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(34px, 6vw, 52px);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 18px;
      color: var(--teal-900);
      letter-spacing: -1px;
    }
    .hero h1 em { font-style: italic; color: var(--teal-700); }
    .hero-sub {
      font-size: 18px;
      color: var(--text-2);
      max-width: 560px;
      margin: 0 auto 28px;
    }
    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--teal-100);
      color: var(--teal-700);
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    /* ============================================================
       Section régions
       ============================================================ */
    .regions {
      margin-top: 40px;
    }
    .regions h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--teal-900);
      text-align: center;
    }
    .regions-sub {
      text-align: center;
      color: var(--text-2);
      margin-bottom: 24px;
    }
    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }
    .region-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .2s ease;
    }
    .region-card.active {
      border-color: var(--teal-600);
      background: var(--teal-50);
      cursor: pointer;
    }
    .region-card.active:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .region-card.soon { opacity: .9; }
    .region-card.planned { opacity: .55; }
    .region-flag {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--sand-100);
      display: grid;
      place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .region-card.active .region-flag { background: var(--teal-700); }
    .region-name { font-weight: 700; font-size: 15px; }
    .region-status {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .region-card.soon .region-status { color: var(--warning); font-weight: 700; }
    .region-card.active .region-status { color: var(--teal-700); font-weight: 700; }

    /* ============================================================
       How it works
       ============================================================ */
    .how {
      margin-top: 60px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .how h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 28px;
      color: var(--teal-900);
      text-align: center;
    }
    .how-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .how-step {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .how-step-num {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--sand-200);
      color: var(--teal-800);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 14px;
    }
    .how-step h3 {
      font-size: 17px;
      margin-bottom: 6px;
    }
    .how-step p { color: var(--text-2); font-size: 14px; }

    /* ============================================================
       Forms
       ============================================================ */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .field { margin-bottom: 16px; }
    .field-full { grid-column: 1 / -1; }

    /* ============================================================
       Toast
       ============================================================ */
    #toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: calc(100vw - 40px);
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--teal-600);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow-lg);
      animation: toastIn .25s ease;
      max-width: 380px;
      font-size: 14px;
      font-weight: 500;
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error   { border-left-color: var(--error); }
    .toast.warning { border-left-color: var(--warning); }
    .toast.info    { border-left-color: var(--info); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       Modal
       ============================================================ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(28, 25, 23, .45);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: grid;
      place-items: center;
      padding: 16px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 460px;
      padding: 28px;
      animation: modalIn .2s ease;
    }
    .modal.modal-lg { max-width: 720px; }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .modal h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .modal .modal-sub { color: var(--text-2); font-size: 14px; margin-bottom: 20px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ============================================================
       Loader
       ============================================================ */
    #loader-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(2px);
      z-index: 800;
      display: none;
      place-items: center;
    }
    #loader-overlay.show { display: grid; }
    .loader-content {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px 32px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 600;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--teal-100);
      border-top-color: var(--teal-700);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       Demo banner
       ============================================================ */
    #demo-badge {
      position: fixed;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--warning);
      color: #fff;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .5px;
      box-shadow: var(--shadow);
      z-index: 90;
      display: none;
      text-transform: uppercase;
    }
    #demo-badge.show { display: block; }
    @media (max-width: 600px) {
      #demo-badge { top: 70px; font-size: 11px; padding: 5px 12px; }
    }

    /* ============================================================
       Pro / Admin dashboard
       ============================================================ */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }
    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
    .sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      height: fit-content;
      position: sticky;
      top: 80px;
    }
    @media (max-width: 900px) {
      .sidebar { position: static; }
    }
    .sidebar-user {
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-user-name { font-weight: 700; font-size: 15px; }
    .sidebar-user-id { font-size: 12px; color: var(--muted); font-family: ui-monospace, monospace; margin-top: 2px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav button {
      text-align: left;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      transition: all .12s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-nav button:hover { background: var(--sand-50); color: var(--text); }
    .sidebar-nav button.active { background: var(--teal-700); color: #fff; }
    .sidebar-nav .nav-icon { width: 18px; text-align: center; }

    /* ============================================================
       Tables
       ============================================================ */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 600px;
    }
    table.data th {
      text-align: left;
      padding: 10px 14px;
      background: var(--sand-50);
      font-weight: 700;
      color: var(--text-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    table.data td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr:hover { background: var(--sand-50); }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .badge.processed { background: #dcfce7; color: #166534; }
    .badge.pending   { background: #fef3c7; color: #92400e; }
    .badge.failed    { background: #fee2e2; color: #991b1b; }
    .badge.actif     { background: #dcfce7; color: #166534; }
    .badge.archive   { background: #e7e5e4; color: #57534e; }

    /* ============================================================
       Stats
       ============================================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 600;
      color: var(--teal-800);
    }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ============================================================
       Utilities
       ============================================================ */
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-12 { margin-bottom: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 12px; }
    .mono { font-family: ui-monospace, 'SF Mono', Monaco, monospace; font-size: 13px; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .hidden { display: none !important; }

    /* ============================================================
       Footer
       ============================================================ */
    .footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }
    .footer a { color: var(--text-2); }

    /* ============================================================
       Inscription success
       ============================================================ */
    .pin-display {
      background: var(--sand-100);
      border: 2px dashed var(--teal-600);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin: 20px 0;
    }
    .pin-display .pin-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-2);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .pin-display .pin-value {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--teal-900);
    }
    .pin-display .pin-id {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      color: var(--text-2);
      margin-top: 8px;
    }

    /* ============================================================
       Markdown preview
       ============================================================ */
    .md-preview {
      background: var(--sand-50);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-family: ui-monospace, monospace;
      font-size: 12.5px;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* ============================================================
       Page header
       ============================================================ */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 28px;

  <script>
  /* ============================================================

    BACKEND_URL: 'https://script.google.com/macros/s/AKfycbzQNSOAGCJp1QmZU0IE1FYiKmKCcGgTUpqKa3RJG9lwiAND_EC5dGdbh2XCu26ZTMoxtw/exec'

  const state = {
    mode: 'real',                  // 'real' | 'demo'

  // ------------------------------------------------------------
  //  PWA manifest dynamique
  // ------------------------------------------------------------
  (function injectManifest() {
    const manifest = {
      name: 'YOUPI® Annuaire intelligent',
      short_name: 'YOUPI',
      start_url: '.',
      display: 'standalone',
      background_color: '#fafaf9',
      theme_color: '#0f766e',

        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f766e'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='sans-serif' font-size='52' font-weight='800' fill='%23f5e6d3'%3EY%3C/text%3E%3C/svg%3E",
        sizes: '512x512',
        type: 'image/svg+xml'
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);
  })();

  // ------------------------------------------------------------
  //  LOGGING
  // ------------------------------------------------------------
  function log(...args) {
    console.log('[YOUPI]', ...args);
  }

  // ------------------------------------------------------------
  //  API CLIENT
  // ------------------------------------------------------------
  async function api(action, data = {}) {
    // En mode démo, on ne fait JAMAIS de requête réseau modifiante
    if (state.mode === 'demo') {
      return demoHandle(action, data);
    }

    if (APP.BACKEND_URL.includes('REPLACE_WITH')) {
      toast('error', 'BACKEND_URL non configurée. Édite le fichier HTML.');
      return { ok: false, error: 'BACKEND_URL non configurée' };
    }

    // Retry avec backoff
    const delays = [300, 800, 2000];
    let lastErr = null;
    for (let attempt = 0; attempt <= delays.length; attempt++) {
      try {
        const resp = await fetch(APP.BACKEND_URL, {
          method: 'POST',
          // Apps Script doPost lit e.postData.contents — on envoie en text/plain pour éviter le preflight CORS
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, data })
        });
        const json = await resp.json();
        log('api', action, json);
        return json;
      } catch (err) {
        lastErr = err;
        log('api err', action, err);
        if (attempt < delays.length) await new Promise(r => setTimeout(r, delays[attempt]));
      }
    }
    return { ok: false, error: 'Erreur réseau : ' + (lastErr ? lastErr.message : 'inconnue') };
  }

  // ------------------------------------------------------------
  //  TOAST
  // ------------------------------------------------------------
  function toast(level, msg, duration = 3500) {
    const el = document.createElement('div');
    el.className = 'toast ' + level;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => {
      el.style.transition = 'opacity .2s ease';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 200);
    }, duration);
  }

  // ------------------------------------------------------------
  //  LOADER
  // ------------------------------------------------------------
  function showLoader(text = 'Chargement…') {
    document.getElementById('loader-text').textContent = text;
    document.getElementById('loader-overlay').classList.add('show');
  }
  function hideLoader() {
    document.getElementById('loader-overlay').classList.remove('show');
  }

  // ------------------------------------------------------------
  //  MODAL
  // ------------------------------------------------------------
  function openModal(html, opts = {}) {
    const zone = document.getElementById('modal-zone');
    zone.innerHTML = `
      <div class="modal-backdrop" id="modal-bd">
        <div class="modal ${opts.large ? 'modal-lg' : ''}">${html}</div>
      </div>`;
    document.getElementById('modal-bd').addEventListener('click', e => {
      if (e.target.id === 'modal-bd' && !opts.persistent) closeModal();
    });
  }
  function closeModal() {
    document.getElementById('modal-zone').innerHTML = '';
  }

  // ------------------------------------------------------------
  //  HELPERS
  // ------------------------------------------------------------
  function esc(s) {
    if (s === undefined || s === null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function fmtDate(s) {
    if (!s) return '—';
    try {
      const d = new Date(s);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return s; }
  }
  function saveSession() {
    try {
      localStorage.setItem('youpi_session', JSON.stringify(state.user));
    } catch {}
  }
  function loadSession() {
    try {
      const raw = localStorage.getItem('youpi_session');
      if (raw) state.user = JSON.parse(raw);
    } catch {}
  }
  function clearSession() {
    state.user = null;
    try { localStorage.removeItem('youpi_session'); } catch {}
  }

  async function adminReprocessPage(id) {
    if (!confirm('Régénérer le markdown IA pour ' + id + ' ?')) return;
    showLoader('Régénération…');
    const r = await api('reprocessPage', { token: state.user.token, page_id: id });

  async function submitPrompts(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    showLoader('Sauvegarde…');
    const r = await api('updatePrompts', {
      token: state.user.token,
      prompt_company: fd.get('prompt_company'),
      prompt_page: fd.get('prompt_page')
    });
    hideLoader();
    if (!r.ok) return toast('error', r.error);
    toast('success', 'Prompts sauvegardés ✅');
  }

  // Mode démo : intercepte toutes les actions API et renvoie des données fictives sans réseau
  function demoHandle(action, data) {
    log('demo', action, data);
    const sleep = () => new Promise(r => setTimeout(r, 200 + Math.random() * 300));
    return sleep().then(() => {
      switch (action) {
        case 'getConfig': return {
          ok: true,
          sectors: ['Restauration & Cafés','Auto & Mécanique','Beauté & Bien-être','BTP & Travaux','Éducation & Formation','Tourisme & Loisirs','Autre'],
          regions: [
            { code: 'MQ', name: 'Martinique', status: 'active' },
            { code: 'GP', name: 'Guadeloupe', status: 'soon' },
            { code: 'GF', name: 'Guyane', status: 'planned' },
            { code: 'RE', name: 'La Réunion', status: 'planned' }
          ]
        };
        case 'registerCompany':
          // En démo : on simule mais on n'écrit nulle part
          return { ok: true, company_id: 'YPI-MQ-9999', pin: '482917', message: 'Démo : aucune donnée n\'a été enregistrée.' };
        case 'loginCompany':
          const c = demoSnapshot.companies.find(x => x.id === data.company_id);
          if (!c) return { ok: false, error: 'Compte démo introuvable' };
          return { ok: true, company: c, token: 'demo-token' };
        case 'getCompanyData':
          return { ok: true, company: demoSnapshot.companies.find(x => x.id === data.company_id) };
        case 'updateCompany':
          const idx = demoSnapshot.companies.findIndex(x => x.id === data.company_id);
          if (idx >= 0) {
            Object.assign(demoSnapshot.companies[idx], data);
            demoSnapshot.companies[idx].last_updated_at = new Date().toISOString();
          }
          return { ok: true };
        case 'changePIN': return { ok: true };
        case 'addServicePage':
          const newPage = {
            id: 'YPI-PAGE-' + String(90000 + Math.floor(Math.random() * 9999)),
            company_id: data.company_id, date_creation: new Date().toISOString(), statut: 'actif',
            titre_service: data.titre_service, description_detaillee: data.description_detaillee,
            image_url: data.image_url || '', chatling_status: 'processed',
            chatling_processed_at: new Date().toISOString(),
            markdown_genere: '### ' + data.titre_service + '\n\n' + data.description_detaillee + '\n\n_(markdown simulé en mode démo)_'
          };
          demoSnapshot.pages.push(newPage);
          return { ok: true, page_id: newPage.id };
        case 'listMyPages':
          return { ok: true, pages: demoSnapshot.pages.filter(p => p.company_id === data.company_id && p.statut === 'actif') };
        case 'deleteMyPage':
          const pi = demoSnapshot.pages.findIndex(p => p.id === data.page_id);
          if (pi >= 0) demoSnapshot.pages[pi].statut = 'archive';
          return { ok: true };
        case 'loginAdmin':
          return { ok: true, token: 'demo-admin-token' };
        case 'listCompanies':
          return { ok: true, companies: demoSnapshot.companies };
        case 'listAllPages':
          return { ok: true, pages: demoSnapshot.pages };
        case 'getStats':
          const byRegion = {}, bySector = {}, byChatling = { processed:0, pending:0, failed:0 };
          demoSnapshot.companies.forEach(c => {
            byRegion[c.region] = (byRegion[c.region] || 0) + 1;
            bySector[c.secteur] = (bySector[c.secteur] || 0) + 1;
            if (byChatling[c.chatling_status] !== undefined) byChatling[c.chatling_status]++;
          });
          const byMonth = { '2026-01': 0, '2026-02': 1, '2026-03': 2, '2026-04': 2, '2026-05': 1 };
          return {
            ok: true, total_companies: demoSnapshot.companies.length, total_pages: demoSnapshot.pages.length,
            by_region: byRegion, by_sector: bySector, by_chatling_status: byChatling, by_month: byMonth
          };
        case 'reprocessCompany': case 'reprocessPage':
          return { ok: true, chatling: { ok: true }, markdown: '(markdown régénéré en démo)' };
        case 'updateCompanyAdmin': case 'deleteCompany': return { ok: true };
        case 'getPrompts': return { ok: true, prompts: { prompt_company: '(prompt démo entreprise)', prompt_page: '(prompt démo page)' } };
        case 'updatePrompts': return { ok: true };
        case 'getAuditLog':
          return { ok: true, logs: [
            { timestamp: '2026-05-13T10:00:00Z', level: 'INFO', action: 'demo-mode', actor: '', detail: 'Mode démonstration activé' },
            { timestamp: '2026-05-01T08:30:00Z', level: 'INFO', action: 'registerCompany', actor: '', detail: 'YPI-MQ-0006 / Anse Plongée' },
            { timestamp: '2026-04-22T16:00:00Z', level: 'INFO', action: 'registerCompany', actor: '', detail: 'YPI-MQ-0005 / Lékol Kreyòl' }
          ]};
        default: return { ok: false, error: 'Action démo non simulée : ' + action };
      }
    });
  }

  // ============================================================
  //  BOOT
  // ============================================================
  async function boot() {
    document.getElementById('footer-version').textContent = APP.version;

    // Charger la session si présente
    loadSession();

    // Charger la config publique (régions + secteurs)
    const cfg = await api('getConfig');
    if (cfg && cfg.ok) {
      state.config = cfg;
    } else {
      // Fallback offline
      state.config = {
        sectors: ['Restauration & Cafés','Auto & Mécanique','Beauté & Bien-être','BTP & Travaux','Tourisme & Loisirs','Santé & Paramédical','Services à la personne','Commerce & Boutiques','Numérique & Tech','Autre'],
        regions: [
          { code: 'MQ', name: 'Martinique', status: 'active' },
          { code: 'GP', name: 'Guadeloupe', status: 'soon' }
        ]
      };
    }

    // Si user en session, on essaie de rafraîchir ses données
    if (state.user && state.user.type === 'company') {
      const r = await api('getCompanyData', { company_id: state.user.id, token: state.user.token });
      if (r && r.ok) { state.user.data = r.company; saveSession(); }
      else { clearSession(); }
    }

    // Vue initiale
    if (state.user && state.user.type === 'company') navigate('pro-dashboard');
    else if (state.user && state.user.type === 'admin') navigate('admin-dashboard');
    else navigate('home');
  }

  // Démarrage
  boot();
  </script>
