  // Toggle d'expansion d'une ligne admin pages services
  function toggleAdminPageDetails(pageId) {
    const row = document.getElementById('adminrow-' + pageId);
    if (!row) return;
    const isOpen = row.classList.contains('expanded');

    document.querySelectorAll('#admin-pages-list .expand-row.expanded').forEach(r => {
      if (r.id !== row.id) r.classList.remove('expanded');
    });

    if (isOpen) {
      row.classList.remove('expanded');
    } else {
      row.classList.add('expanded');
      setTimeout(() => {
        const top = row.getBoundingClientRect().top + window.scrollY - 90;
        window.scrollTo({ top, behavior: 'smooth' });
      }, 120);
    }
  }

  async function adminReprocessPage(id) {
    if (!confirm('Régénérer le markdown IA pour ' + id + ' ?')) return;
    showLoader('Régénération…');
    const r = await api('reprocessPage', { token: state.user.token, page_id: id });
    hideLoader();
    if (!r.ok) return toast('error', r.error);
    toast('success', 'Page régénérée');
    renderAdminPages();
  }

  async function adminRunExpirationCheck() {
    if (!confirm("Lancer maintenant la vérification des pages expirées ?\n\n• Toutes les pages dont la date d'expiration est dépassée seront retirées de Chatling\n• Leur statut passera à 'expired' dans le Sheet\n\nCette opération est normalement exécutée automatiquement chaque jour à 3h du matin.")) return;
    showLoader('Vérification des expirations…');
    const r = await api('runExpirationCheck', { token: state.user.token });
    hideLoader();
    if (!r.ok) return toast('error', r.error);
    const count = r.expired_count || 0;
    if (count === 0) {
      toast('info', 'Aucune page à expirer pour le moment ✅');

    renderAdminPages();
  }

  /**
   * Insère un bouton cliquable (CTA) dans le corps du mail.
   * Le HTML utilise des styles inline et une <table> pour la
   * compatibilité avec tous les clients mail (Outlook, Gmail, etc.).
   */
  function crmInsertCTA() {
    const text = prompt('Texte du bouton (ex. "Accéder à mon espace pro") :', 'Accéder à mon espace pro');
    if (!text || !text.trim()) return;
    const url = prompt('URL de destination (ex. https://annuaire-youpi.github.io/annuaire-youpi/#login-pro) :',
      'https://annuaire-youpi.github.io/annuaire-youpi/#login-pro');
    if (!url || !url.trim()) return;

    const safeText = text.trim().replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const safeUrl = url.trim().replace(/"/g, '&quot;');

    // Bouton avec <table> pour compatibilité Outlook (centré)
    const cta =
      '<table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:24px auto;border-collapse:separate;">' +
        '<tr><td align="center" style="background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);border-radius:8px;box-shadow:0 4px 12px rgba(37,99,235,0.25);text-align:center;">' +
          '<a href="' + safeUrl + '" target="_blank" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:0.2px;text-align:center;mso-padding-alt:0;line-height:1.2;">' +
            safeText +
          '</a>' +
        '</td></tr>' +
      '</table>' +
      '<p>&nbsp;</p>';

    insertHtmlAtCursor(cta);
  }
  window.crmInsertCTA = crmInsertCTA;

  /**
   * Insère un bloc de mise en valeur (fond bleu clair, bordure gauche bleue).
   * Idéal pour un chiffre marquant, une astuce, une promesse.
   */
  function crmInsertHighlight() {
    const placeholder = '💡 <strong>Le saviez-vous&nbsp;?</strong><br>Remplacez ce texte par votre mise en valeur.';
    const block =
      '<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:20px 0;">' +
        '<tr><td style="background:#eff6ff;border-left:4px solid #2563eb;border-radius:6px;padding:16px 20px;color:#1e3a8a;font-size:14px;line-height:1.6;">' +
          placeholder +
        '</td></tr>' +
      '</table>' +
      '<p>&nbsp;</p>';
    insertHtmlAtCursor(block);
  }
  window.crmInsertHighlight = crmInsertHighlight;

  /**
   * Insère du HTML brut à la position du curseur dans l'éditeur WYSIWYG.
   * Fallback : ajout à la fin si pas de curseur dans l'éditeur.
   */
  function insertHtmlAtCursor(html) {
    const editor = document.getElementById('crm-edit-body');
    if (!editor) return;
    editor.focus();
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
      // Utilise execCommand pour bénéficier de l'undo natif
      document.execCommand('insertHTML', false, html);
    } else {
      editor.innerHTML += html;
    }
    _crm.editorDraft.body = editor.innerHTML;
    updateCrmPreview();
  }

  function insertCrmVariable(key) {
    const editor = document.getElementById('crm-edit-body');
    if (!editor) return;
    editor.focus();
    // Tente d'insérer à la position du curseur
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
      document.execCommand('insertText', false, '{{' + key + '}}');
    } else {
      // Pas de curseur dans l'éditeur : ajoute à la fin
      editor.innerHTML = editor.innerHTML + '{{' + key + '}}';
    }
    _crm.editorDraft.body = editor.innerHTML;
    updateCrmPreview();
  }
  window.insertCrmVariable = insertCrmVariable;

  // Interpolation côté client pour l'aperçu
  function crmInterpolate(text, company) {
    if (!text) return '';
    return String(text)
      .replace(/\{\{nom_entreprise\}\}/g, company.nom_entreprise || '')
      .replace(/\{\{prenom_contact\}\}/g, company.prenom_contact || '')
      .replace(/\{\{secteur\}\}/g, company.secteur || '')
      .replace(/\{\{ville\}\}/g, company.ville || '')
      .replace(/\{\{region\}\}/g, company.region || '')
      .replace(/\{\{email\}\}/g, company.email || '')
      .replace(/\{\{telephone\}\}/g, company.telephone || '')
      .replace(/\{\{site_web\}\}/g, company.site_web || '');
  }

  function escapeHtmlSafe(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function updateCrmPreview() {
    const d = _crm.editorDraft || {};
    const subjEl = document.getElementById('crm-preview-subject-text');
    const iframe = document.getElementById('crm-preview-iframe');
    if (!subjEl || !iframe) return;

    const interpSubject = crmInterpolate(d.subject || '', CRM_PREVIEW_COMPANY) || '(pas d\'objet)';
    const interpBody = crmInterpolate(d.body || '', CRM_PREVIEW_COMPANY);
    subjEl.textContent = interpSubject;

    const html = crmBuildPreviewHtml(interpSubject, interpBody);
    iframe.srcdoc = html;
  }
  window.updateCrmPreview = updateCrmPreview;

  async function saveMailTemplate() {
    const d = _crm.editorDraft || {};
    if (!d.name || !d.name.trim()) { toast('error', 'Le nom du modèle est requis'); return; }
    if (!d.subject || !d.subject.trim()) { toast('error', 'L\'objet du mail est requis'); return; }
    if (!d.body || !d.body.trim() || d.body === '<br>') { toast('error', 'Le corps du mail est requis'); return; }

    const payload = {
      token: state.user.token,
      name: d.name.trim(),
      subject: d.subject.trim(),
      body: d.body
    };
    if (_crm.editingId !== 'new') payload.id = _crm.editingId;

    try {
      const r = await api('adminSaveMailTemplate', payload);
      if (!r.ok) {
        toast('error', 'Erreur : ' + (r.error || 'inconnue'));
        return;
      }
      toast('success', r.created ? 'Modèle créé ✅' : 'Modifications enregistrées ✅');
      _crm.editingId = null;
      _crm.editorDraft = null;
      await renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.saveMailTemplate = saveMailTemplate;

  // Helper : date courte FR
  function formatDateShort(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch (e) {
      return iso;
    }
  }

  // Résumé textuel d'un objet filters (pour la vue liste)
  function summarizeFilters(f) {
    const parts = [];
    if (f.sectors && f.sectors.length) {
      parts.push('<strong>Secteurs :</strong> ' + (f.sectors.length > 3 ? f.sectors.length + ' sélectionnés' : f.sectors.map(esc).join(', ')));
    }
    if (f.statuts && f.statuts.length) {
      parts.push('<strong>Statuts :</strong> ' + f.statuts.map(esc).join(', '));
    }
    if (f.regions && f.regions.length) {
      parts.push('<strong>Régions :</strong> ' + f.regions.map(esc).join(', '));
    }
    if (f.facebook_statuts && f.facebook_statuts.length) {
      parts.push('<strong>Facebook :</strong> ' + f.facebook_statuts.length + ' sélectionnés');
    }
    if (f.registered_after) parts.push('<strong>Inscrites après :</strong> ' + esc(f.registered_after));
    if (f.registered_before) parts.push('<strong>Inscrites avant :</strong> ' + esc(f.registered_before));
    if (f.not_mailed_since_days && f.not_mailed_since_days > 0) {
      parts.push('<strong>Pas mailées depuis :</strong> ' + f.not_mailed_since_days + ' jours');
    }
    return parts.length ? parts.join(' · ') : '<span style="color:var(--text-2)">Aucun filtre (toutes les entreprises avec email)</span>';
  }

  function startNewMailSegment() {
    _crm.segEditingId = 'new';
    _crm.segDraft = {
      name: '',
      description: '',
      filters: emptyFilters()
    };
    _crm.segPreviewCount = null;
    _crm.segPreviewSample = [];
    renderCrmContent();
  }
  window.startNewMailSegment = startNewMailSegment;

  function editMailSegment(id) {
    const s = _crm.segments.find(function(x) { return x.id === id; });
    if (!s) return;
    _crm.segEditingId = id;
    _crm.segDraft = {
      name: s.name,
      description: s.description || '',
      filters: Object.assign(emptyFilters(), s.filters || {})
    };
    _crm.segPreviewCount = null;
    _crm.segPreviewSample = [];
    renderCrmContent();
  }
  window.editMailSegment = editMailSegment;

  function duplicateMailSegment(id) {
    const s = _crm.segments.find(function(x) { return x.id === id; });
    if (!s) return;
    _crm.segEditingId = 'new';
    _crm.segDraft = {
      name: s.name + ' (copie)',
      description: s.description || '',
      filters: Object.assign(emptyFilters(), s.filters || {})
    };
    _crm.segPreviewCount = null;
    _crm.segPreviewSample = [];
    renderCrmContent();
  }
  window.duplicateMailSegment = duplicateMailSegment;

  async function deleteMailSegment(id, name) {
    if (!confirm('Supprimer définitivement le segment « ' + name + ' » ?')) return;
    try {
      const r = await api('adminDeleteMailSegment', { token: state.user.token, id: id });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', 'Segment supprimé');
      _crm.segments = _crm.segments.filter(function(x) { return x.id !== id; });
      renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.deleteMailSegment = deleteMailSegment;

  function cancelMailSegmentEdit() {
    if (_crm.segDraft && (_crm.segDraft.name || _crm.segDraft.description)) {
      if (!confirm('Annuler les modifications en cours ?')) return;
    }
    _crm.segEditingId = null;
    _crm.segDraft = null;
    _crm.segPreviewCount = null;
    _crm.segPreviewSample = [];
    renderCrmContent();
  }
  window.cancelMailSegmentEdit = cancelMailSegmentEdit;

  // ─── ÉDITEUR DE SEGMENT ─────────────────────────────────────

      regionsHtml += `
        <label class="crm-check">
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleSegFilter('regions', this.value, this.checked)" value="${esc(r.key)}">
          <span>${esc(r.label)}</span>
        </label>
      `;
    });
    regionsHtml += '</div>';

    // Cases facebook (sous spoiler pour pas surcharger)
    let fbHtml = '<div style="display:flex;flex-wrap:wrap;gap:8px">';
    CRM_FB_STATUTS.forEach(function(f) {

      fbHtml += `
        <label class="crm-check">
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleSegFilter('facebook_statuts', this.value, this.checked)" value="${esc(f.key)}">

        </label>
      `;
    });
    fbHtml += '</div>';

    container.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 360px;gap:16px" id="crm-seg-grid">

          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <h3 style="margin:0">${isNew ? '➕ Nouveau segment' : '✏️ Modifier le segment'}</h3>
              <button class="btn btn-ghost btn-sm" onclick="cancelMailSegmentEdit()">← Retour</button>
            </div>

            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Nom du segment</label>
            <input type="text" value="${esc(d.name)}" placeholder="Ex. Restos MQ inscrits +30j"
              oninput="_crm.segDraft.name = this.value"
              style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;margin-bottom:14px">

            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Description <span style="color:var(--text-2);font-weight:400">(optionnel)</span></label>
            <input type="text" value="${esc(d.description)}" placeholder="Pour quoi sert ce segment ?"
              oninput="_crm.segDraft.description = this.value"
              style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;margin-bottom:20px">

            <div class="crm-filter-section">
              <div class="crm-filter-title">📂 Secteurs <span class="crm-filter-hint">(vide = tous)</span></div>
              ${sectorsHtml}
              <div class="crm-filter-toolbar">
                <button type="button" class="btn-mini" onclick="selectAllSegFilter('sectors')">Tout cocher</button>
                <button type="button" class="btn-mini" onclick="clearSegFilter('sectors')">Tout décocher</button>
              </div>
            </div>

            <div class="crm-filter-section">
              <div class="crm-filter-title">🔖 Statuts <span class="crm-filter-hint">(vide = tous)</span></div>
              ${statutsHtml}
            </div>

            <div class="crm-filter-section">
              <div class="crm-filter-title">🌴 Régions <span class="crm-filter-hint">(vide = toutes)</span></div>
              ${regionsHtml}
            </div>

            <div class="crm-filter-section">
              <div class="crm-filter-title">📘 Statut Facebook <span class="crm-filter-hint">(optionnel)</span></div>
              ${fbHtml}
            </div>

            <div class="crm-filter-section">
              <div class="crm-filter-title">📅 Date d'inscription <span class="crm-filter-hint">(optionnel)</span></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-2);margin-bottom:4px">Après le</label>
                  <input type="date" value="${esc(d.filters.registered_after || '')}"
                    oninput="setSegFilter('registered_after', this.value)"
                    style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                </div>
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-2);margin-bottom:4px">Avant le</label>
                  <input type="date" value="${esc(d.filters.registered_before || '')}"
                    oninput="setSegFilter('registered_before', this.value)"
                    style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                </div>
              </div>
            </div>

            <div class="crm-filter-section">
              <div class="crm-filter-title">📬 Anti-matraquage <span class="crm-filter-hint">(optionnel)</span></div>
              <label style="display:block;font-size:12px;color:var(--text-2);margin-bottom:4px">Exclure les entreprises ayant reçu un mail dans les derniers</label>
              <div style="display:flex;align-items:center;gap:8px">
                <input type="number" min="0" max="365" value="${d.filters.not_mailed_since_days || 0}"
                  oninput="setSegFilter('not_mailed_since_days', parseInt(this.value, 10) || 0)"
                  style="width:100px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                <span style="color:var(--text-2);font-size:13px">jours (0 = pas de filtre)</span>
              </div>
            </div>

            <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="saveMailSegment()">${isNew ? 'Créer le segment' : 'Enregistrer les modifications'}</button>
              <button class="btn btn-ghost" onclick="cancelMailSegmentEdit()">Annuler</button>
              <button class="btn btn-secondary" onclick="resetSegFilters()" style="margin-left:auto">↺ Réinitialiser les filtres</button>
            </div>
          </div>
        </div>

        <!-- COLONNE DROITE : aperçu live -->
        <div>
          <div class="card" style="position:sticky;top:16px">
            <h3 style="margin:0 0 4px 0">🎯 Aperçu du ciblage</h3>
            <div style="font-size:12px;color:var(--text-2);margin-bottom:16px">
              Mise à jour automatique en temps réel.
            </div>
            <div id="crm-seg-preview-count" style="text-align:center;padding:24px;background:var(--sand-50);border-radius:var(--radius);margin-bottom:12px">
              <div style="font-size:36px;font-weight:700;color:var(--teal-700);line-height:1">—</div>
              <div style="color:var(--text-2);font-size:13px;margin-top:4px">entreprise(s) matchent vos critères</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="toggleSegPreviewList()" style="width:100%" id="crm-seg-toggle-list">📋 Voir la liste détaillée</button>
            <div id="crm-seg-preview-list" style="display:none;margin-top:12px;max-height:400px;overflow-y:auto"></div>
          </div>

    `;

    // Sur mobile : empile
    if (window.innerWidth < 900) {
      const grid = document.getElementById('crm-seg-grid');
      if (grid) grid.style.gridTemplateColumns = '1fr';
    }

    // Lance le 1er preview
    refreshSegPreview();
  }

  // ─── ÉDITEUR DE SEGMENT : LOGIQUE FILTRES ──────────────────

  function toggleSegFilter(key, value, checked) {
    if (!_crm.segDraft) return;
    if (!Array.isArray(_crm.segDraft.filters[key])) _crm.segDraft.filters[key] = [];
    const arr = _crm.segDraft.filters[key];
    const idx = arr.indexOf(value);
    if (checked && idx === -1) arr.push(value);
    else if (!checked && idx !== -1) arr.splice(idx, 1);
    schedulePreviewRefresh();
  }
  window.toggleSegFilter = toggleSegFilter;

  function setSegFilter(key, value) {
    if (!_crm.segDraft) return;
    _crm.segDraft.filters[key] = value;
    schedulePreviewRefresh();
  }
  window.setSegFilter = setSegFilter;

  function selectAllSegFilter(key) {
    if (!_crm.segDraft) return;
    if (key === 'sectors') {
      _crm.segDraft.filters.sectors = ((state.config && state.config.sectors) || []).slice();
    }
    // Re-render pour mettre à jour les cases à cocher
    renderCrmContent();
  }
  window.selectAllSegFilter = selectAllSegFilter;

  function clearSegFilter(key) {
    if (!_crm.segDraft) return;
    _crm.segDraft.filters[key] = [];
    renderCrmContent();
  }
  window.clearSegFilter = clearSegFilter;

  function resetSegFilters() {
    if (!_crm.segDraft) return;
    if (!confirm('Réinitialiser tous les filtres ?')) return;
    _crm.segDraft.filters = emptyFilters();
    renderCrmContent();
  }
  window.resetSegFilters = resetSegFilters;

  // Debounce le rafraîchissement du preview pour ne pas spammer le backend
  function schedulePreviewRefresh() {
    if (_crm.segPreviewTimer) clearTimeout(_crm.segPreviewTimer);
    _crm.segPreviewTimer = setTimeout(refreshSegPreview, 350);
  }

  async function refreshSegPreview() {
    if (!_crm.segDraft) return;
    if (_crm.segPreviewLoading) return;
    _crm.segPreviewLoading = true;
    const countEl = document.getElementById('crm-seg-preview-count');
    if (countEl) {
      countEl.innerHTML = '<div style="font-size:36px;font-weight:700;color:var(--text-2);line-height:1">⏳</div><div style="color:var(--text-2);font-size:13px;margin-top:4px">calcul en cours...</div>';
    }
    try {
      const r = await api('adminPreviewCrmRecipients', {
        token: state.user.token,
        filters: _crm.segDraft.filters
      });
      _crm.segPreviewLoading = false;
      if (!r.ok) {
        if (countEl) countEl.innerHTML = `<div style="color:#dc2626">Erreur : ${esc(r.error || 'inconnue')}</div>`;
        return;
      }
      _crm.segPreviewCount = r.count;
      _crm.segPreviewSample = (r.recipients || []).slice(0, 50);
      updateSegPreviewUI();
    } catch (err) {
      _crm.segPreviewLoading = false;
      if (countEl) countEl.innerHTML = `<div style="color:#dc2626">Erreur réseau</div>`;
    }
  }

  function updateSegPreviewUI() {
    const countEl = document.getElementById('crm-seg-preview-count');
    if (!countEl) return;
    const count = _crm.segPreviewCount;
    const color = count > 0 ? 'var(--teal-700)' : '#dc2626';
    countEl.innerHTML = `
      <div style="font-size:36px;font-weight:700;color:${color};line-height:1">${count}</div>
      <div style="color:var(--text-2);font-size:13px;margin-top:4px">
        ${count === 0 ? 'aucune entreprise ne matche vos critères' : (count === 1 ? 'entreprise matche vos critères' : 'entreprises matchent vos critères')}
      </div>
    `;
    // Refresh la liste si déjà ouverte
    const listEl = document.getElementById('crm-seg-preview-list');
    if (listEl && listEl.style.display !== 'none') {
      renderSegPreviewList();
    }
  }

  function toggleSegPreviewList() {
    const listEl = document.getElementById('crm-seg-preview-list');
    const toggleBtn = document.getElementById('crm-seg-toggle-list');
    if (!listEl) return;
    if (listEl.style.display === 'none') {
      listEl.style.display = 'block';
      if (toggleBtn) toggleBtn.textContent = '🔼 Masquer la liste';
      renderSegPreviewList();
    } else {
      listEl.style.display = 'none';
      if (toggleBtn) toggleBtn.textContent = '📋 Voir la liste détaillée';
    }
  }
  window.toggleSegPreviewList = toggleSegPreviewList;

  function renderSegPreviewList() {
    const listEl = document.getElementById('crm-seg-preview-list');
    if (!listEl) return;
    const sample = _crm.segPreviewSample || [];
    const total = _crm.segPreviewCount || 0;
    if (sample.length === 0) {
      listEl.innerHTML = '<div style="color:var(--text-2);font-size:13px;text-align:center;padding:16px">Aucune entreprise</div>';
      return;
    }
    let html = '<div style="font-size:12px;color:var(--text-2);margin-bottom:8px">' +
      (total > 50 ? `Aperçu des 50 premières (sur ${total})` : `${sample.length} entreprise${sample.length > 1 ? 's' : ''}`) + ' :</div>';
    html += '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">';
    sample.forEach(function(c, i) {
      html += `
        <div style="padding:8px 12px;font-size:12px;border-bottom:${i < sample.length - 1 ? '1px solid var(--border)' : 'none'};background:${i % 2 ? 'var(--sand-50)' : 'transparent'}">
          <div style="font-weight:600;color:var(--text-1)">${esc(c.nom_entreprise || '(sans nom)')}</div>
          <div style="color:var(--text-2);font-size:11px">${esc(c.secteur || '')} · ${esc(c.ville || '')} · ${esc(c.email || '(pas d\'email)')}</div>
        </div>
      `;
    });
    html += '</div>';
    listEl.innerHTML = html;
  }

  async function saveMailSegment() {
    const d = _crm.segDraft || {};
    if (!d.name || !d.name.trim()) { toast('error', 'Le nom du segment est requis'); return; }
    const payload = {
      token: state.user.token,
      name: d.name.trim(),
      description: (d.description || '').trim(),
      filters: d.filters
    };
    if (_crm.segEditingId !== 'new') payload.id = _crm.segEditingId;
    try {
      const r = await api('adminSaveMailSegment', payload);
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', r.created ? 'Segment créé ✅' : 'Modifications enregistrées ✅');
      _crm.segEditingId = null;
      _crm.segDraft = null;
      _crm.segPreviewCount = null;
      _crm.segPreviewSample = [];
      await renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.saveMailSegment = saveMailSegment;

  // ─── SOUS-SECTION : ENVOYER UNE CAMPAGNE ────────────────────

  async function renderCrmSend(container) {
    if (_crm.sendStep === 'history') {
      await renderCrmSendHistory(container);
      return;
    }

    container.innerHTML = `
      <div class="card crm-empty">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <div>Chargement...</div>
      </div>
    `;

    // Charge en parallèle : templates, segments, quota
    try {
      const [tplR, segR, quotaR] = await Promise.all([
        api('adminListMailTemplates', { token: state.user.token }),
        api('adminListMailSegments', { token: state.user.token }),
        api('adminGetMailQuota', { token: state.user.token })
      ]);
      if (!tplR.ok) throw new Error(tplR.error || 'Erreur chargement modèles');
      if (!segR.ok) throw new Error(segR.error || 'Erreur chargement segments');
      _crm.templates = tplR.templates || [];
      _crm.segments = segR.segments || [];
      _crm.sendQuotaRemaining = (quotaR.ok ? quotaR.remaining : null);
    } catch (err) {
      container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur : ${esc(err.message)}</div></div>`;
      return;
    }

    renderCrmSendUI(container);
  }

  function renderCrmSendUI(container) {
    const tpl = _crm.sendTemplateId ? _crm.templates.find(function(t) { return t.id === _crm.sendTemplateId; }) : null;
    const seg = _crm.sendSegmentId && _crm.sendSegmentId !== '__none__'
      ? _crm.segments.find(function(s) { return s.id === _crm.sendSegmentId; })
      : null;

    // Si le dernier envoi a réussi, afficher l'écran de résultat
    if (_crm.sendResult) {
      renderCrmSendResult(container);
      return;
    }

    // Banniere quota
    const quota = _crm.sendQuotaRemaining;
    let quotaBadge = '';
    if (quota !== null) {
      const lowQuota = quota < 20;
      quotaBadge = `
        <div style="padding:10px 14px;background:${lowQuota ? '#fef3c7' : 'var(--sand-50)'};border:1px solid ${lowQuota ? '#fcd34d' : 'var(--border)'};border-radius:var(--radius);font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:16px">
          <span style="font-size:18px">${lowQuota ? '⚠️' : '📬'}</span>
          <span>
            <strong>${quota}</strong> mail${quota > 1 ? 's' : ''} restant${quota > 1 ? 's' : ''} aujourd'hui
            ${lowQuota ? '<span style="color:#92400e"> — quota Gmail bientôt épuisé</span>' : ''}
          </span>
        </div>
      `;
    }

    // Construire dropdown modèles
    let tplOptions = '<option value="">— Choisir un modèle —</option>';
    _crm.templates.forEach(function(t) {
      tplOptions += `<option value="${esc(t.id)}" ${t.id === _crm.sendTemplateId ? 'selected' : ''}>${esc(t.name)}</option>`;
    });

    // Construire dropdown segments
    let segOptions = '<option value="">— Choisir un segment —</option>';
    _crm.segments.forEach(function(s) {
      segOptions += `<option value="${esc(s.id)}" ${s.id === _crm.sendSegmentId ? 'selected' : ''}>${esc(s.name)}</option>`;
    });

    // Sections étapes
    let html = `
      ${quotaBadge}

      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span class="crm-step-num">1</span>
          <h3 style="margin:0">Choisir le modèle de mail</h3>
        </div>
        ${_crm.templates.length === 0
          ? `<div style="color:#dc2626;font-size:13px">Aucun modèle disponible. <a href="#" onclick="switchCrmTab('templates');return false">Créez un modèle</a> avant de pouvoir envoyer.</div>`
          : `<select id="crm-send-tpl" onchange="onCrmSendTemplateChange(this.value)" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:white">${tplOptions}</select>`
        }
        ${tpl ? renderTemplatePreviewBox(tpl) : ''}
      </div>

      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span class="crm-step-num">2</span>
          <h3 style="margin:0">Choisir le segment à cibler</h3>
        </div>
        ${_crm.segments.length === 0
          ? `<div style="color:#dc2626;font-size:13px">Aucun segment disponible. <a href="#" onclick="switchCrmTab('segments');return false">Créez un segment</a> avant de pouvoir envoyer.</div>`
          : `<select id="crm-send-seg" onchange="onCrmSendSegmentChange(this.value)" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:white">${segOptions}</select>`
        }
        ${seg ? renderSegmentPreviewBox(seg) : ''}
      </div>

      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span class="crm-step-num">3</span>
          <h3 style="margin:0">Vérifier et envoyer</h3>
        </div>

  function renderTemplatePreviewBox(tpl) {
    if (!tpl) return '';
    return `
      <div style="margin-top:12px;padding:12px;background:var(--sand-50);border-radius:var(--radius);font-size:13px">
        <div style="margin-bottom:6px"><strong style="color:var(--text-2)">Objet :</strong> ${esc(tpl.subject)}</div>
        <details>
          <summary style="cursor:pointer;color:var(--teal-700);font-size:12px">Voir le corps du mail</summary>
          <div style="margin-top:10px;padding:12px;background:white;border-radius:6px;border:1px solid var(--border);max-height:200px;overflow-y:auto;font-size:13px;line-height:1.5">
            ${tpl.body}
          </div>
        </details>
      </div>
    `;
  }

  function renderSegmentPreviewBox(seg) {
    if (!seg) return '';
    const summary = summarizeFilters(seg.filters || {});
    let countLine = '';
    if (_crm.sendLoading) {
      countLine = '<div style="margin-top:10px;color:var(--text-2);font-size:13px">⏳ Calcul des destinataires...</div>';
    } else if (_crm.sendCount !== null) {
      const color = _crm.sendCount > 0 ? 'var(--teal-700)' : '#dc2626';
      countLine = `
        <div style="margin-top:10px;display:flex;align-items:center;gap:10px;font-size:14px">
          <span style="font-size:24px;font-weight:700;color:${color}">${_crm.sendCount}</span>
          <span style="color:var(--text-2)">entreprise${_crm.sendCount > 1 ? 's' : ''} ciblée${_crm.sendCount > 1 ? 's' : ''}</span>
        </div>
      `;
    }
    return `
      <div style="margin-top:12px;padding:12px;background:var(--sand-50);border-radius:var(--radius);font-size:13px">
        ${seg.description ? `<div style="margin-bottom:8px;color:var(--text-2)">${esc(seg.description)}</div>` : ''}
        <div style="line-height:1.5">${summary}</div>
        ${countLine}
      </div>
    `;
  }

  function renderSendSummary(tpl, seg) {
    if (!tpl) {
      return '<div style="color:var(--text-2);font-size:13px">Choisissez d\'abord un modèle de mail (étape 1).</div>';
    }
    if (!seg) {
      return '<div style="color:var(--text-2);font-size:13px">Choisissez ensuite un segment (étape 2).</div>';
    }
    if (_crm.sendLoading) {
      return '<div style="color:var(--text-2);font-size:13px">⏳ Calcul des destinataires en cours...</div>';
    }
    if (_crm.sendCount === null) {
      return '<div style="color:var(--text-2);font-size:13px">Calcul des destinataires...</div>';
    }
    if (_crm.sendCount === 0) {
      return `
        <div style="padding:12px;background:#fee2e2;border-radius:var(--radius);font-size:13px;color:#991b1b">
          ❌ Aucune entreprise ne correspond aux critères de ce segment. Modifiez le segment ou choisissez-en un autre.
        </div>
      `;
    }
    const quota = _crm.sendQuotaRemaining;
    const overQuota = (quota !== null && _crm.sendCount > quota);

    let warning = '';
    if (overQuota) {
      warning = `
        <div style="padding:12px;background:#fee2e2;border-radius:var(--radius);font-size:13px;color:#991b1b;margin-bottom:12px">
          ⚠️ Vous voulez envoyer ${_crm.sendCount} mails mais il ne vous reste que ${quota} envois aujourd'hui. Veuillez réduire le segment ou attendre demain.
        </div>
      `;
    }

    return `
      ${warning}
      <div style="padding:14px;background:var(--sand-50);border-radius:var(--radius);margin-bottom:14px">
        <div style="font-size:14px;line-height:1.7">
          Vous allez envoyer le mail<br>
          <strong style="color:var(--teal-700)">« ${esc(tpl.name)} »</strong><br>
          à <strong style="color:var(--teal-700)">${_crm.sendCount} entreprise${_crm.sendCount > 1 ? 's' : ''}</strong>
          du segment <strong>${esc(seg.name)}</strong>.
        </div>
        <div style="margin-top:10px">
          <button class="btn btn-ghost btn-sm" onclick="toggleSendRecipientsList()" id="crm-send-toggle-list">📋 Voir la liste des destinataires</button>
        </div>
        <div id="crm-send-recipients-list" style="display:none;margin-top:12px"></div>
      </div>

      <label class="crm-confirm-check" style="display:flex;align-items:flex-start;gap:10px;padding:14px 16px;background:white;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:14px">
        <input type="checkbox" ${_crm.sendConfirmed ? 'checked' : ''} onchange="_crm.sendConfirmed = this.checked; updateSendButton()" style="margin-top:2px;flex-shrink:0;width:18px;height:18px;cursor:pointer">
        <span style="font-size:13px;line-height:1.5;flex:1;min-width:0">
          J'ai vérifié le contenu du mail et la liste des destinataires.<br>
          <span style="color:var(--text-2)">Je confirme l'envoi de <strong>${_crm.sendCount} mail${_crm.sendCount > 1 ? 's' : ''}</strong> aux entreprises du segment <strong>${esc(seg.name)}</strong>.</span>
        </span>
      </label>

      <button id="crm-send-btn" class="btn btn-primary" onclick="confirmAndSendCampaign()"
        ${(!_crm.sendConfirmed || overQuota) ? 'disabled' : ''}
        style="width:100%;padding:14px;font-size:15px;font-weight:600">
        📤 Envoyer la campagne (${_crm.sendCount} mail${_crm.sendCount > 1 ? 's' : ''})
      </button>
    `;
  }

  async function onCrmSendTemplateChange(tplId) {
    _crm.sendTemplateId = tplId || null;
    _crm.sendConfirmed = false;
    renderCrmSendUI(document.getElementById('crm-content'));
  }
  window.onCrmSendTemplateChange = onCrmSendTemplateChange;

  async function onCrmSendSegmentChange(segId) {
    _crm.sendSegmentId = segId || null;
    _crm.sendCount = null;
    _crm.sendSample = [];
    _crm.sendConfirmed = false;
    if (!segId) {
      renderCrmSendUI(document.getElementById('crm-content'));
      return;
    }
    // Re-render avec loading
    _crm.sendLoading = true;
    renderCrmSendUI(document.getElementById('crm-content'));
    // Charge le preview
    const seg = _crm.segments.find(function(s) { return s.id === segId; });
    if (!seg) { _crm.sendLoading = false; return; }
    try {
      const r = await api('adminPreviewCrmRecipients', {
        token: state.user.token,
        filters: seg.filters || {}
      });
      _crm.sendLoading = false;
      if (!r.ok) {
        toast('error', 'Erreur : ' + (r.error || 'inconnue'));
        renderCrmSendUI(document.getElementById('crm-content'));
        return;
      }
      _crm.sendCount = r.count;
      _crm.sendSample = (r.recipients || []).slice(0, 50);
    } catch (err) {
      _crm.sendLoading = false;
      toast('error', 'Erreur réseau : ' + err.message);
    }
    renderCrmSendUI(document.getElementById('crm-content'));
  }
  window.onCrmSendSegmentChange = onCrmSendSegmentChange;

  function updateSendButton() {
    const btn = document.getElementById('crm-send-btn');
    if (!btn) return;
    const overQuota = (_crm.sendQuotaRemaining !== null && _crm.sendCount > _crm.sendQuotaRemaining);
    btn.disabled = !_crm.sendConfirmed || overQuota;
  }
  window.updateSendButton = updateSendButton;

  function toggleSendRecipientsList() {
    const listEl = document.getElementById('crm-send-recipients-list');
    const toggleBtn = document.getElementById('crm-send-toggle-list');
    if (!listEl) return;
    if (listEl.style.display === 'none') {
      listEl.style.display = 'block';
      if (toggleBtn) toggleBtn.textContent = '🔼 Masquer la liste';
      renderSendRecipientsList();
    } else {
      listEl.style.display = 'none';
      if (toggleBtn) toggleBtn.textContent = '📋 Voir la liste des destinataires';
    }
  }
  window.toggleSendRecipientsList = toggleSendRecipientsList;

  function renderSendRecipientsList() {
    const listEl = document.getElementById('crm-send-recipients-list');
    if (!listEl) return;
    const sample = _crm.sendSample || [];
    const total = _crm.sendCount || 0;
    if (sample.length === 0) {
      listEl.innerHTML = '<div style="color:var(--text-2);font-size:13px;text-align:center;padding:16px">Aucune entreprise</div>';
      return;
    }
    let html = '<div style="font-size:12px;color:var(--text-2);margin-bottom:8px">' +
      (total > 50 ? `Aperçu des 50 premiers (sur ${total})` : `${sample.length} destinataire${sample.length > 1 ? 's' : ''}`) + ' :</div>';
    html += '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:300px;overflow-y:auto">';
    sample.forEach(function(c, i) {
      html += `
        <div style="padding:8px 12px;font-size:12px;border-bottom:${i < sample.length - 1 ? '1px solid var(--border)' : 'none'};background:${i % 2 ? 'var(--sand-50)' : 'transparent'}">
          <div style="font-weight:600">${esc(c.nom_entreprise || '(sans nom)')}</div>
          <div style="color:var(--text-2);font-size:11px">${esc(c.email || '(pas d\'email)')} · ${esc(c.secteur || '')} · ${esc(c.ville || '')}</div>
        </div>
      `;
    });
    html += '</div>';
    listEl.innerHTML = html;
  }

  // ─── ENVOI EFFECTIF ─────────────────────────────────────────

  async function confirmAndSendCampaign() {
    if (!_crm.sendTemplateId || !_crm.sendSegmentId) return;
    if (!_crm.sendConfirmed) {
      toast('error', 'Veuillez confirmer que vous avez vérifié le contenu');
      return;
    }
    if (_crm.sendCount === 0) {
      toast('error', 'Aucun destinataire à envoyer');
      return;
    }

    const tpl = _crm.templates.find(function(t) { return t.id === _crm.sendTemplateId; });
    const seg = _crm.segments.find(function(s) { return s.id === _crm.sendSegmentId; });
    if (!tpl || !seg) return;

    // Double confirmation native
    const msg = `⚠️ DERNIÈRE CONFIRMATION\n\n`
      + `Envoyer le mail « ${tpl.name} »\n`
      + `à ${_crm.sendCount} entreprise${_crm.sendCount > 1 ? 's' : ''}\n`
      + `du segment « ${seg.name} » ?\n\n`
      + `Cette action est irréversible.`;
    if (!confirm(msg)) return;

    // Récupère la liste exhaustive des company_ids matchant le segment
    // (sendSample est limité à 50, on a besoin de tous)
    let companyIds = [];
    try {
      const previewR = await api('adminPreviewCrmRecipients', {
        token: state.user.token,
        filters: seg.filters || {}
      });
      if (!previewR.ok) {
        toast('error', 'Erreur préparation : ' + (previewR.error || 'inconnue'));
        return;
      }
      companyIds = (previewR.recipients || []).map(function(r) { return r.id; });
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
      return;
    }

    if (companyIds.length === 0) {
      toast('error', 'Plus aucun destinataire (la liste a changé)');
      return;
    }

    // Affichage en cours d'envoi
    const btn = document.getElementById('crm-send-btn');
    if (btn) {
      btn.disabled = true;
      btn.textContent = '⏳ Envoi en cours, merci de patienter...';
    }

    try {
      const r = await api('adminSendCrmCampaign', {
        token: state.user.token,
        template_id: _crm.sendTemplateId,
        company_ids: companyIds,
        segment_id: _crm.sendSegmentId,
        segment_name: seg.name,
        filters: seg.filters
      });
      if (!r.ok) {
        toast('error', 'Erreur : ' + (r.error || 'inconnue'));
        if (btn) {
          btn.disabled = false;
          btn.textContent = '📤 Envoyer la campagne (' + _crm.sendCount + ' mails)';
        }
        return;
      }
      _crm.sendResult = {
        sent: r.sent,
        failed: r.failed,
        errors: r.errors || [],
        campaign_id: r.campaign_id,
        quota_remaining: r.quota_remaining
      };
      _crm.sendQuotaRemaining = r.quota_remaining;
      renderCrmSendUI(document.getElementById('crm-content'));
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
      if (btn) {
        btn.disabled = false;
        btn.textContent = '📤 Envoyer la campagne (' + _crm.sendCount + ' mails)';
      }
    }
  }
  window.confirmAndSendCampaign = confirmAndSendCampaign;

  function renderCrmSendResult(container) {
    const r = _crm.sendResult;
    const total = r.sent + r.failed;
    const allOk = r.failed === 0;
    container.innerHTML = `
      <div class="card" style="text-align:center;padding:32px 24px">
        <div style="font-size:64px;margin-bottom:8px">${allOk ? '✅' : '⚠️'}</div>
        <h2 style="margin:0 0 8px 0">${allOk ? 'Campagne envoyée avec succès' : 'Campagne envoyée avec des erreurs'}</h2>
        <div style="color:var(--text-2);font-size:14px;margin-bottom:24px">${total} envoi${total > 1 ? 's' : ''} traité${total > 1 ? 's' : ''}</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto 20px">
          <div style="padding:16px;background:#dcfce7;border-radius:var(--radius)">
            <div style="font-size:32px;font-weight:700;color:#166534;line-height:1">${r.sent}</div>
            <div style="font-size:12px;color:#166534;margin-top:4px">envoyé${r.sent > 1 ? 's' : ''}</div>
          </div>
          <div style="padding:16px;background:${r.failed > 0 ? '#fee2e2' : 'var(--sand-50)'};border-radius:var(--radius)">
            <div style="font-size:32px;font-weight:700;color:${r.failed > 0 ? '#991b1b' : 'var(--text-2)'};line-height:1">${r.failed}</div>
            <div style="font-size:12px;color:${r.failed > 0 ? '#991b1b' : 'var(--text-2)'};margin-top:4px">échec${r.failed > 1 ? 's' : ''}</div>
          </div>
        </div>

        ${r.errors && r.errors.length > 0 ? `
          <details style="text-align:left;margin-bottom:20px">
            <summary style="cursor:pointer;color:#dc2626;font-size:13px">Voir le détail des erreurs (${r.errors.length})</summary>
            <ul style="margin-top:10px;padding-left:20px;font-size:12px;color:var(--text-1);line-height:1.6">
              ${r.errors.map(function(e) { return '<li>' + esc(e) + '</li>'; }).join('')}
            </ul>
          </details>
        ` : ''}

        <div style="padding:10px 14px;background:var(--sand-50);border-radius:var(--radius);font-size:13px;color:var(--text-2);margin-bottom:24px">
          📬 Il vous reste <strong>${r.quota_remaining}</strong> mail${r.quota_remaining > 1 ? 's' : ''} à envoyer aujourd'hui
        </div>

        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="resetCrmSend()">📤 Envoyer une autre campagne</button>
          <button class="btn btn-secondary" onclick="goToCrmHistory()">📜 Voir l'historique</button>
        </div>
      </div>
    `;
  }

  function resetCrmSend() {
    _crm.sendTemplateId = null;
    _crm.sendSegmentId = null;
    _crm.sendCount = null;
    _crm.sendSample = [];
    _crm.sendConfirmed = false;
    _crm.sendResult = null;
    renderCrmContent();
  }
  window.resetCrmSend = resetCrmSend;

  // ─── HISTORIQUE DES CAMPAGNES ──────────────────────────────

  async function goToCrmHistory() {
    _crm.sendStep = 'history';
    await renderCrmContent();
  }
  window.goToCrmHistory = goToCrmHistory;

  async function leaveCrmHistory() {
    _crm.sendStep = 'compose';
    await renderCrmContent();
  }
  window.leaveCrmHistory = leaveCrmHistory;

  async function renderCrmSendHistory(container) {
    container.innerHTML = `
      <div class="card crm-empty">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <div>Chargement de l'historique...</div>
      </div>
    `;
    try {
      const r = await api('adminListMailCampaigns', { token: state.user.token });
      if (!r.ok) {
        container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur : ${esc(r.error || 'inconnue')}</div></div>`;
        return;
      }
      _crm.sendCampaigns = r.campaigns || [];
    } catch (err) {
      container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur réseau : ${esc(err.message)}</div></div>`;
      return;
    }

    let html = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div>
          <h3 style="margin:0">📜 Historique des campagnes</h3>
          <div style="color:var(--text-2);font-size:13px;margin-top:4px">${_crm.sendCampaigns.length} campagne${_crm.sendCampaigns.length > 1 ? 's' : ''} enregistrée${_crm.sendCampaigns.length > 1 ? 's' : ''}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="leaveCrmHistory()">← Retour</button>
      </div>
    `;

    if (_crm.sendCampaigns.length === 0) {
      html += `
        <div class="card crm-empty">
          <div style="font-size:48px;margin-bottom:12px">📜</div>
          <p style="margin:0">Aucune campagne n'a encore été envoyée.</p>
        </div>
      `;
    } else {
      html += '<div>';
      _crm.sendCampaigns.forEach(function(c) {
        const total = (c.success_count || 0) + (c.error_count || 0);
        const successPct = total > 0 ? Math.round((c.success_count / total) * 100) : 0;

          <div class="crm-template-card">

                <div style="color:var(--text-2);font-size:12px;margin-bottom:6px">

                <div style="display:flex;gap:14px;font-size:12px;flex-wrap:wrap">

  // ─── SOUS-SECTION : AUTOMATISATIONS ─────────────────────────

  // Helper : label lisible d'un event key
  function autoEventLabel(eventKey) {
    const evt = (_crm.autoEvents || []).find(function(e) { return e.key === eventKey; });
    return evt ? evt.label : eventKey;
  }

  async function renderCrmAutomations(container) {
    // En mode édition
    if (_crm.autoEditingId !== null) {
      await renderCrmAutomationEditor(container);
      return;
    }
    // En mode file d'attente
    if (_crm.autoView === 'queue') {
      await renderCrmAutomationQueue(container);
      return;
    }

    container.innerHTML = `
      <div class="card crm-empty">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <div>Chargement des automatisations...</div>
      </div>
    `;

    try {
      const [autoR, tplR] = await Promise.all([
        api('adminListMailAutomations', { token: state.user.token }),
        api('adminListMailTemplates', { token: state.user.token })
      ]);
      if (!autoR.ok) throw new Error(autoR.error || 'Erreur chargement');
      _crm.autos = autoR.automations || [];
      _crm.autoEvents = autoR.events || [];
      _crm.templates = tplR.ok ? (tplR.templates || []) : [];

      container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur : ${esc(err.message)}</div></div>`;

          <div style="font-size:13px;line-height:1.6;color:#1e3a8a">
            Les <strong>automatisations</strong> envoient des séries de mails programmés
            quand un événement se produit (nouvelle inscription, mise en pause d'une fiche, etc.).
            Le traitement automatique a lieu chaque matin à 6h&nbsp;: assurez-vous que les envois quotidiens sont activés ci-dessous.
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:14px;font-weight:600">⚙️ Envois automatiques quotidiens</div>
          <span id="crm-trigger-status" style="font-size:12px;color:var(--text-2)">État inconnu</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="enableAutomationTrigger(true)">✅ Activer</button>
          <button class="btn btn-ghost btn-sm" onclick="enableAutomationTrigger(false)" style="color:#dc2626">⏹️ Désactiver</button>
          <button class="btn btn-ghost btn-sm" onclick="processQueueNowFromUI()">⚡ Traiter maintenant</button>

      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div style="color:var(--text-2);font-size:14px">

        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="goToAutomationQueue()">📋 File d'attente</button>
          <button class="btn btn-primary" onclick="startNewAutomation()">+ Nouvelle automatisation</button>
        </div>
      </div>

    if (_crm.autos.length === 0) {
      html += `
        <div class="card crm-empty">
          <div style="font-size:48px;margin-bottom:12px">🤖</div>
          <h3 style="margin:0 0 8px 0">Aucune automatisation pour l'instant</h3>
          <p style="margin:0 0 16px 0">Créez votre première séquence automatique de mails.</p>
          <button class="btn btn-primary" onclick="startNewAutomation()">+ Créer une automatisation</button>
        </div>
      `;
    } else {
      html += '<div>';
      _crm.autos.forEach(function(a) {
        const stepsLabel = a.steps.length > 0
          ? a.steps.map(function(s) { return 'J+' + s.delay_days; }).join(' → ')
          : 'aucune étape';
        const statusBadge = a.enabled
          ? '<span style="background:#dcfce7;color:#166534;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600">● ACTIVE</span>'
          : '<span style="background:#f1f5f9;color:#64748b;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600">● INACTIVE</span>';
        html += `
          <div class="crm-template-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
                  <div style="font-weight:600;font-size:15px">${esc(a.name)}</div>
                  ${statusBadge}
                </div>
                ${a.description ? `<div style="color:var(--text-2);font-size:13px;margin-bottom:8px">${esc(a.description)}</div>` : ''}
                <div style="font-size:12px;margin-bottom:6px">
                  <strong>Déclencheur :</strong> ${esc(autoEventLabel(a.trigger_event))}
                </div>
                <div style="font-size:12px;margin-bottom:8px;color:var(--text-1)">
                  <strong>Séquence :</strong> ${esc(stepsLabel)} (${a.steps.length} étape${a.steps.length > 1 ? 's' : ''})
                </div>
                <div style="font-size:12px;display:flex;gap:14px;flex-wrap:wrap;color:var(--text-2)">
                  <span>📥 <strong style="color:var(--teal-700)">${a.total_enrolled}</strong> entreprise${a.total_enrolled > 1 ? 's' : ''} enrôlée${a.total_enrolled > 1 ? 's' : ''}</span>
                  <span>📤 <strong style="color:var(--teal-700)">${a.total_sent}</strong> mail${a.total_sent > 1 ? 's' : ''} envoyé${a.total_sent > 1 ? 's' : ''}</span>
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start">
                <button class="btn btn-secondary btn-sm" onclick="toggleAutomation('${esc(a.id)}', ${!a.enabled})">
                  ${a.enabled ? '⏸️ Désactiver' : '▶️ Activer'}
                </button>
                <button class="btn btn-secondary btn-sm" onclick="editAutomation('${esc(a.id)}')">✏️ Modifier</button>
                <button class="btn btn-ghost btn-sm" onclick="deleteAutomation('${esc(a.id)}', '${esc(a.name).replace(/'/g, '&apos;')}')" style="color:#dc2626">🗑️</button>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';
    }

    container.innerHTML = html;
    // Charge l'état du trigger en arrière-plan
    refreshTriggerStatusBadge();
  }

  // Cosmétique uniquement : on n'a pas d'endpoint pour lire l'état du trigger,
  // donc on affiche un message générique. Le bouton "Activer" est idempotent
  // côté backend, donc pas besoin de connaître l'état.
  function refreshTriggerStatusBadge() {
    const el = document.getElementById('crm-trigger-status');
    if (el) el.textContent = '(activer pour démarrer les envois quotidiens à 6h)';
  }

  async function enableAutomationTrigger(enable) {
    const action = enable ? 'activer' : 'désactiver';
    if (!confirm('Voulez-vous ' + action + ' les envois automatiques quotidiens ?')) return;
    try {
      const r = await api('adminSetupAutomationTrigger', {
        token: state.user.token,
        enable: enable
      });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', enable
        ? 'Envois automatiques activés ✅ (déclenchement quotidien à 6h)'
        : 'Envois automatiques désactivés ⏹️');
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.enableAutomationTrigger = enableAutomationTrigger;

  async function processQueueNowFromUI() {
    if (!confirm('Traiter immédiatement tous les mails dus dans la file d\'attente ?\n\nUtile pour tester sans attendre le traitement quotidien automatique.')) return;
    toast('info', '⏳ Traitement en cours...');
    try {
      const r = await api('adminProcessQueueNow', { token: state.user.token });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      let msg = '✅ ' + r.sent + ' mail' + (r.sent > 1 ? 's' : '') + ' envoyé' + (r.sent > 1 ? 's' : '');
      if (r.errors > 0) msg += ' · ' + r.errors + ' erreur' + (r.errors > 1 ? 's' : '');
      if (r.skipped_quota > 0) msg += ' · ' + r.skipped_quota + ' reporté' + (r.skipped_quota > 1 ? 's' : '') + ' (quota)';
      toast('success', msg, 6000);
      // Recharge la liste pour mettre à jour les compteurs
      _crm.autoEditingId = null;
      _crm.autoDraft = null;
      await renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.processQueueNowFromUI = processQueueNowFromUI;

  function startNewAutomation() {
    _crm.autoEditingId = 'new';
    _crm.autoDraft = {
      name: '',
      description: '',
      trigger_event: 'new_registration',
      enabled: true,
      steps: [
        { delay_days: 0, template_id: '', template_name: '' }
      ]
    };
    renderCrmContent();
  }
  window.startNewAutomation = startNewAutomation;

  function editAutomation(id) {
    const a = _crm.autos.find(function(x) { return x.id === id; });
    if (!a) return;
    _crm.autoEditingId = id;
    _crm.autoDraft = {
      name: a.name,
      description: a.description || '',
      trigger_event: a.trigger_event,
      enabled: a.enabled,
      steps: (a.steps || []).map(function(s) {
        return {
          delay_days: Number(s.delay_days) || 0,
          template_id: s.template_id || '',
          template_name: s.template_name || ''
        };
      })
    };
    renderCrmContent();
  }
  window.editAutomation = editAutomation;

  async function toggleAutomation(id, enable) {
    try {
      const r = await api('adminToggleMailAutomation', {
        token: state.user.token,
        id: id,
        enabled: enable
      });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', enable ? 'Automatisation activée ▶️' : 'Automatisation désactivée ⏸️');
      const a = _crm.autos.find(function(x) { return x.id === id; });
      if (a) a.enabled = enable;
      renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.toggleAutomation = toggleAutomation;

  async function deleteAutomation(id, name) {
    const cancelPending = confirm(
      '⚠️ Supprimer l\'automatisation « ' + name + ' » ?\n\n' +
      'OK : supprimer ET annuler les mails en attente liés\n' +
      'Annuler : ne pas supprimer'
    );
    if (!cancelPending) return;
    try {
      const r = await api('adminDeleteMailAutomation', {
        token: state.user.token,
        id: id,
        cancel_pending: true
      });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', 'Automatisation supprimée');
      _crm.autos = _crm.autos.filter(function(x) { return x.id !== id; });
      renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.deleteAutomation = deleteAutomation;

  function cancelAutomationEdit() {
    if (_crm.autoDraft && _crm.autoDraft.name) {
      if (!confirm('Annuler les modifications en cours ?')) return;
    }
    _crm.autoEditingId = null;
    _crm.autoDraft = null;
    renderCrmContent();
  }
  window.cancelAutomationEdit = cancelAutomationEdit;

  // ─── ÉDITEUR D'AUTOMATISATION ───────────────────────────────

  async function renderCrmAutomationEditor(container) {
    const isNew = _crm.autoEditingId === 'new';
    const d = _crm.autoDraft;
    if (!d) {
      container.innerHTML = `<div class="card">Aucun brouillon en cours.</div>`;
      return;
    }

    // Construire dropdown déclencheurs
    let eventOptions = '';
    (_crm.autoEvents || []).forEach(function(e) {
      eventOptions += `<option value="${esc(e.key)}" ${e.key === d.trigger_event ? 'selected' : ''}>${esc(e.label)}</option>`;
    });

    // Construire la liste des étapes
    let stepsHtml = '';
    d.steps.forEach(function(step, idx) {
      let tplOptions = '<option value="">— Choisir un modèle —</option>';
      _crm.templates.forEach(function(t) {
        tplOptions += `<option value="${esc(t.id)}" ${t.id === step.template_id ? 'selected' : ''}>${esc(t.name)}</option>`;
      });
      stepsHtml += `
        <div class="crm-auto-step">
          <div class="crm-auto-step-num">${idx + 1}</div>
          <div style="flex:1;display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:end">
            <div>
              <label style="display:block;font-size:11px;color:var(--text-2);margin-bottom:4px;font-weight:600">Délai (jours)</label>
              <input type="number" min="0" max="365" value="${step.delay_days}"
                oninput="updateAutoStep(${idx}, 'delay_days', parseInt(this.value, 10) || 0)"
                style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
            </div>
            <div>
              <label style="display:block;font-size:11px;color:var(--text-2);margin-bottom:4px;font-weight:600">Modèle de mail à envoyer</label>
              <select onchange="updateAutoStepTemplate(${idx}, this.value)"
                style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:white">
                ${tplOptions}
              </select>
            </div>
            <div>
              <button class="btn btn-ghost btn-sm" onclick="removeAutoStep(${idx})" title="Supprimer cette étape" style="color:#dc2626">🗑️</button>
            </div>
          </div>
        </div>
      `;
    });

    container.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="margin:0">${isNew ? '➕ Nouvelle automatisation' : '✏️ Modifier l\'automatisation'}</h3>
          <button class="btn btn-ghost btn-sm" onclick="cancelAutomationEdit()">← Retour</button>
        </div>

        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Nom de l'automatisation</label>
        <input type="text" value="${esc(d.name)}" placeholder="Ex. Onboarding nouvelle inscription"
          oninput="_crm.autoDraft.name = this.value"
          style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;margin-bottom:14px">

        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Description <span style="color:var(--text-2);font-weight:400">(optionnel)</span></label>
        <input type="text" value="${esc(d.description)}" placeholder="À quoi sert cette séquence ?"
          oninput="_crm.autoDraft.description = this.value"
          style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;margin-bottom:20px">

        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">⚡ Déclencheur</label>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:6px">Événement qui déclenche cette séquence automatiquement.</div>
        <select onchange="_crm.autoDraft.trigger_event = this.value"
          style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:white;margin-bottom:24px">
          ${eventOptions}
        </select>

        <div class="crm-filter-section" style="border-top:1px solid var(--border);padding-top:18px;margin-bottom:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div class="crm-filter-title" style="margin:0">📬 Étapes de la séquence</div>
            <button class="btn btn-secondary btn-sm" onclick="addAutoStep()">+ Ajouter une étape</button>
          </div>
          <div style="font-size:12px;color:var(--text-2);margin-bottom:14px">
            Chaque étape envoie un mail X jours après le déclencheur. Délai 0 = envoi immédiat.
          </div>
          ${_crm.templates.length === 0
            ? `<div style="color:#dc2626;font-size:13px;padding:12px;background:#fee2e2;border-radius:var(--radius)">Aucun modèle disponible. Créez d'abord un modèle dans l'onglet 📝 Modèles.</div>`
            : stepsHtml || '<div style="color:var(--text-2);font-size:13px;padding:16px;text-align:center">Aucune étape. Cliquez sur « + Ajouter une étape ».</div>'}
        </div>

        <div style="display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;padding-top:18px;border-top:1px solid var(--border)">
          <button class="btn btn-primary" onclick="saveAutomation()">${isNew ? 'Créer l\'automatisation' : 'Enregistrer les modifications'}</button>
          <button class="btn btn-ghost" onclick="cancelAutomationEdit()">Annuler</button>
        </div>
      </div>
    `;
  }

  function updateAutoStep(idx, key, value) {
    if (!_crm.autoDraft || !_crm.autoDraft.steps[idx]) return;
    _crm.autoDraft.steps[idx][key] = value;
  }
  window.updateAutoStep = updateAutoStep;

  function updateAutoStepTemplate(idx, tplId) {
    if (!_crm.autoDraft || !_crm.autoDraft.steps[idx]) return;
    _crm.autoDraft.steps[idx].template_id = tplId;
    const tpl = _crm.templates.find(function(t) { return t.id === tplId; });
    _crm.autoDraft.steps[idx].template_name = tpl ? tpl.name : '';
  }
  window.updateAutoStepTemplate = updateAutoStepTemplate;

  function addAutoStep() {
    if (!_crm.autoDraft) return;
    // Délai par défaut = max(délais existants) + 7 jours
    const maxDelay = _crm.autoDraft.steps.reduce(function(m, s) {
      return Math.max(m, Number(s.delay_days) || 0);
    }, 0);
    _crm.autoDraft.steps.push({
      delay_days: maxDelay + 7,
      template_id: '',
      template_name: ''
    });
    renderCrmContent();
  }
  window.addAutoStep = addAutoStep;

  function removeAutoStep(idx) {
    if (!_crm.autoDraft) return;
    if (_crm.autoDraft.steps.length <= 1) {
      toast('error', 'Une automatisation doit avoir au moins une étape');
      return;
    }
    _crm.autoDraft.steps.splice(idx, 1);
    renderCrmContent();
  }
  window.removeAutoStep = removeAutoStep;

  async function saveAutomation() {
    const d = _crm.autoDraft;
    if (!d) return;
    if (!d.name || !d.name.trim()) { toast('error', 'Le nom est requis'); return; }
    if (!d.trigger_event) { toast('error', 'Le déclencheur est requis'); return; }
    if (!Array.isArray(d.steps) || d.steps.length === 0) {
      toast('error', 'Au moins une étape requise'); return;
    }
    for (let i = 0; i < d.steps.length; i++) {
      if (!d.steps[i].template_id) {
        toast('error', 'Étape ' + (i + 1) + ' : choisissez un modèle');
        return;
      }
    }

    const payload = {
      token: state.user.token,
      name: d.name.trim(),
      description: (d.description || '').trim(),
      trigger_event: d.trigger_event,
      enabled: !!d.enabled,
      steps: d.steps.map(function(s) {
        return {
          delay_days: Number(s.delay_days) || 0,
          template_id: s.template_id,
          template_name: s.template_name || ''
        };
      })
    };
    if (_crm.autoEditingId !== 'new') payload.id = _crm.autoEditingId;

    try {
      const r = await api('adminSaveMailAutomation', payload);
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', r.created ? 'Automatisation créée ✅' : 'Modifications enregistrées ✅');
      _crm.autoEditingId = null;
      _crm.autoDraft = null;
      await renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.saveAutomation = saveAutomation;

  // ─── FILE D'ATTENTE ─────────────────────────────────────────

  function goToAutomationQueue() {
    _crm.autoView = 'queue';
    _crm.autoQueueFilter = 'pending';
    renderCrmContent();
  }
  window.goToAutomationQueue = goToAutomationQueue;

  function leaveAutomationQueue() {
    _crm.autoView = 'list';
    renderCrmContent();
  }
  window.leaveAutomationQueue = leaveAutomationQueue;

  function setAutoQueueFilter(f) {
    _crm.autoQueueFilter = f;
    renderCrmContent();
  }
  window.setAutoQueueFilter = setAutoQueueFilter;

  async function cleanupQueueFromUI() {
    const choice = prompt(
      '🗑️ Nettoyage de la file d\'attente\n\n' +
      'Choisissez l\'âge minimum des entrées à supprimer :\n' +
      '  0  = tout (envoyés, annulés, erreurs)\n' +
      '  7  = plus de 7 jours\n' +
      '  30 = plus de 30 jours (recommandé)\n' +
      '  90 = plus de 90 jours\n\n' +
      'Les entrées « En attente » ne sont JAMAIS supprimées.\n' +
      'Saisissez le nombre de jours :',
      '30'
    );
    if (choice === null) return; // Annulation
    const days = parseInt(choice, 10);
    if (isNaN(days) || days < 0) {
      toast('error', 'Nombre invalide');
      return;
    }
    if (!confirm('Supprimer définitivement les entrées traitées de plus de ' + days + ' jours ?\n\nCette action est irréversible.')) return;
    try {
      const r = await api('adminCleanupQueue', {
        token: state.user.token,
        filter: 'all_done',
        older_than_days: days
      });
      if (!r.ok) { toast('error', 'Erreur : ' + (r.error || 'inconnue')); return; }
      toast('success', r.deleted + ' entrée' + (r.deleted > 1 ? 's' : '') + ' supprimée' + (r.deleted > 1 ? 's' : ''));
      renderCrmContent();
    } catch (err) {
      toast('error', 'Erreur réseau : ' + err.message);
    }
  }
  window.cleanupQueueFromUI = cleanupQueueFromUI;

  async function renderCrmAutomationQueue(container) {
    container.innerHTML = `
      <div class="card crm-empty">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <div>Chargement de la file d'attente...</div>
      </div>
    `;

    try {
      const r = await api('adminListAutomationQueue', {
        token: state.user.token,
        filter: _crm.autoQueueFilter
      });
      if (!r.ok) {
        container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur : ${esc(r.error || 'inconnue')}</div></div>`;
        return;
      }
      _crm.autoQueueItems = r.items || [];
    } catch (err) {
      container.innerHTML = `<div class="card"><div style="color:#dc2626">Erreur réseau : ${esc(err.message)}</div></div>`;
      return;
    }

    const filters = [
      { key: 'pending',   label: '⏳ En attente' },
      { key: 'sent',      label: '✅ Envoyés' },
      { key: 'error',     label: '❌ Erreurs' },
      { key: 'cancelled', label: '🚫 Annulés' },
      { key: 'skipped',   label: '⏭️ Reportés' },
      { key: 'all',       label: '📊 Tous' }
    ];
    let filterBar = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    filters.forEach(function(f) {
      const active = f.key === _crm.autoQueueFilter;
      filterBar += `<button class="btn ${active ? 'btn-primary' : 'btn-ghost'} btn-sm" onclick="setAutoQueueFilter('${f.key}')">${f.label}</button>`;
    });
    filterBar += '</div>';

    let html = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div>
          <h3 style="margin:0">📋 File d'attente</h3>
          <div style="color:var(--text-2);font-size:13px;margin-top:4px">${_crm.autoQueueItems.length} entrée${_crm.autoQueueItems.length > 1 ? 's' : ''}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="cleanupQueueFromUI()" style="color:#dc2626" title="Supprimer les entrées traitées (envoyés, erreurs, annulés) anciennes">🗑️ Nettoyer</button>
          <button class="btn btn-ghost btn-sm" onclick="leaveAutomationQueue()">← Retour</button>
        </div>
      </div>
      ${filterBar}
    `;

    if (_crm.autoQueueItems.length === 0) {
      html += `
        <div class="card crm-empty">
          <div style="font-size:48px;margin-bottom:12px">📭</div>
          <p style="margin:0">Aucune entrée dans cette catégorie.</p>
        </div>
      `;
    } else {
      html += '<div>';
      _crm.autoQueueItems.forEach(function(q) {
        const statusBadge = renderQueueStatusBadge(q.status);
        const isPast = new Date(q.scheduled_at).getTime() < Date.now();
        html += `
          <div class="crm-template-card" style="padding:12px 16px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                  ${statusBadge}
                  <span style="font-weight:600;font-size:13px">${esc(q.template_name || '(modèle supprimé)')}</span>
                  <span style="font-size:11px;color:var(--text-2)">étape ${(q.step_index || 0) + 1}</span>
                </div>
                <div style="font-size:12px;color:var(--text-1);margin-bottom:4px">
                  ${esc(q.company_email)} · auto : ${esc(q.automation_name || '—')}
                </div>
                <div style="font-size:11px;color:var(--text-2)">
                  ${q.status === 'pending'
                    ? '📅 Prévu le ' + formatDateTimeShort(q.scheduled_at) + (isPast ? ' <span style="color:#dc2626">(en retard)</span>' : '')
                    : q.status === 'sent'
                      ? '✅ Envoyé le ' + formatDateTimeShort(q.sent_at)
                      : '⏰ ' + formatDateTimeShort(q.sent_at || q.scheduled_at)
                  }
                  ${q.error ? ' · <span style="color:#dc2626">' + esc(q.error) + '</span>' : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  function renderQueueStatusBadge(status) {
    const map = {
      'pending':   { bg: '#fef3c7', color: '#92400e', label: '⏳ En attente' },
      'sent':      { bg: '#dcfce7', color: '#166534', label: '✅ Envoyé' },
      'error':     { bg: '#fee2e2', color: '#991b1b', label: '❌ Erreur' },
      'cancelled': { bg: '#f1f5f9', color: '#64748b', label: '🚫 Annulé' },
      'skipped':   { bg: '#e0e7ff', color: '#3730a3', label: '⏭️ Reporté' }
    };
    const s = map[status] || { bg: '#f1f5f9', color: '#64748b', label: status };
    return `<span style="background:${s.bg};color:${s.color};padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600">${s.label}</span>`;
  }

  function formatDateTimeShort(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch (e) {
      return iso;
    }
  }

  function formatPrice(p) {

  function renderMonthlyChart(monthly) {
    if (!monthly || !monthly.length) return '<p class="text-muted">Pas encore de données.</p>';
    const maxCost = Math.max(...monthly.map(m => m.cost), 0.0001);
    // Graphique SVG en barres
    const W = 720, H = 220, padX = 40, padY = 20, padB = 40;
    const innerW = W - 2 * padX;
    const innerH = H - padY - padB;
    const barGap = 6;
    const barW = (innerW - barGap * (monthly.length - 1)) / monthly.length;

    const bars = monthly.map((m, i) => {
      const h = m.cost > 0 ? Math.max(2, (m.cost / maxCost) * innerH) : 0;
      const x = padX + i * (barW + barGap);
      const y = padY + (innerH - h);
      const labelMonth = m.month.split('-')[1]; // MM
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="#2563eb" opacity="${m.cost > 0 ? 0.9 : 0.2}">
            <title>${m.month} : $${m.cost.toFixed(4)} (${m.calls} appel${m.calls > 1 ? 's' : ''})</title>
          </rect>
          ${m.cost > 0 ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">$${m.cost.toFixed(2)}</text>` : ''}
          <text x="${x + barW/2}" y="${H - padB + 16}" text-anchor="middle" font-size="11" fill="#64748b">${labelMonth}</text>
        </g>
      `;
    }).join('');

    return `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:720px;height:auto;display:block">
        <line x1="${padX}" y1="${padY + innerH}" x2="${W - padX}" y2="${padY + innerH}" stroke="#cbd5e1" stroke-width="1"/>
        <text x="${padX}" y="${padY - 4}" font-size="11" fill="#64748b">$ par mois (max : $${maxCost.toFixed(2)})</text>
        ${bars}
      </svg>
      <p class="text-muted" style="font-size:12px;margin-top:8px">Survolez les barres pour voir le détail.</p>
    `;
  }

  function renderBreakdown(byType, contentTypes) {
    const types = Object.keys(byType);
    if (!types.length) return '<p class="text-muted">Pas encore de données.</p>';
    const total = Object.values(byType).reduce((a, b) => a + b.cost, 0) || 1;
    const labelByKey = {};
    contentTypes.forEach(ct => { labelByKey[ct.key] = ct.icon + ' ' + ct.label; });
    labelByKey.test = '🧪 Tests';
    labelByKey.unknown = '❓ Inconnu';

    return types.map(t => {
      const d = byType[t];
      const pct = (d.cost / total) * 100;
      return `
        <div class="ai-breakdown-row">
          <div class="ai-breakdown-label">${labelByKey[t] || t}</div>
          <div class="ai-breakdown-bar"><div style="width:${pct.toFixed(1)}%"></div></div>
          <div class="ai-breakdown-value">$${d.cost.toFixed(4)} <small>(${d.calls})</small></div>
        </div>
      `;
    }).join('');
  }

  function renderModelBreakdown(byModel) {
    const ids = Object.keys(byModel);
    if (!ids.length) return '<p class="text-muted">Pas encore de données.</p>';
    const total = Object.values(byModel).reduce((a, b) => a + b.cost, 0) || 1;
    const models = (_aiDashboard && _aiDashboard.available_models) || [];
    const nameById = id => {
      const m = models.find(x => x.id === id);
      return m ? m.name : id;
    };

    return ids.map(id => {
      const d = byModel[id];
      const pct = (d.cost / total) * 100;
      return `
        <div class="ai-breakdown-row">
          <div class="ai-breakdown-label">${esc(nameById(id))}</div>
          <div class="ai-breakdown-bar"><div style="width:${pct.toFixed(1)}%"></div></div>
          <div class="ai-breakdown-value">$${d.cost.toFixed(4)} <small>(${d.calls})</small></div>
        </div>
      `;
    }).join('');
  }

  async function saveAllAiSettings() {

    const models = {
      model_company:    document.getElementById('ai-model-company').value,
      model_service:    document.getElementById('ai-model-service').value,
      model_article:    document.getElementById('ai-model-article').value,
      model_instagram:  document.getElementById('ai-model-instagram').value,
      model_immobilier: document.getElementById('ai-model-immobilier').value,
      model_facebook:   document.getElementById('ai-model-facebook').value
    };
    const max_tokens  = parseInt(document.getElementById('ai-max-tokens').value, 10);
    const temperature = parseFloat(document.getElementById('ai-temperature').value);

    showLoader('Enregistrement…');

    // 2. Sauvegarder paramètres + modèles
    const r1 = await api('saveAiSettings', Object.assign({
      token: state.user.token,
      max_tokens: max_tokens,
      temperature: temperature
    }, models));
    if (!r1.ok) { hideLoader(); return toast('error', r1.error); }

    // 3. Sauvegarder les prompts
    const r2 = await api('updatePrompts', {
      token: state.user.token,
      prompt_company:    document.getElementById('prompt-textarea-prompt_company').value,
      prompt_service:    document.getElementById('prompt-textarea-prompt_service').value,

      prompt_facebook_company: document.getElementById('prompt-textarea-prompt_facebook_company').value,
      prompt_facebook_service: document.getElementById('prompt-textarea-prompt_facebook_service').value
    });
    hideLoader();
    if (!r2.ok) return toast('error', r2.error);

    toast('success', 'Configuration IA sauvegardée ✅');
