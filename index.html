  function renderMonthlyChart(monthly) {
    if (!monthly || !monthly.length) return '<p class="text-muted">Pas encore de données.</p>';
    const maxCost = Math.max(...monthly.map(m => m.cost), 0.0001);
    // Graphique SVG en barres
    const W = 720, H = 220, padX = 40, padY = 20, padB = 40;
    const innerW = W - 2 * padX;
    const innerH = H - padY - padB;
    const barGap = 6;
    const barW = (innerW - barGap * (monthly.length - 1)) / monthly.length;

    const bars = monthly.map((m, i) => {
      const h = m.cost > 0 ? Math.max(2, (m.cost / maxCost) * innerH) : 0;
      const x = padX + i * (barW + barGap);
      const y = padY + (innerH - h);
      const labelMonth = m.month.split('-')[1]; // MM
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="#2563eb" opacity="${m.cost > 0 ? 0.9 : 0.2}">
            <title>${m.month} : $${m.cost.toFixed(4)} (${m.calls} appel${m.calls > 1 ? 's' : ''})</title>
          </rect>
          ${m.cost > 0 ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">$${m.cost.toFixed(2)}</text>` : ''}
          <text x="${x + barW/2}" y="${H - padB + 16}" text-anchor="middle" font-size="11" fill="#64748b">${labelMonth}</text>
        </g>
      `;
    }).join('');

    return `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;max-width:720px;height:auto;display:block">
        <line x1="${padX}" y1="${padY + innerH}" x2="${W - padX}" y2="${padY + innerH}" stroke="#cbd5e1" stroke-width="1"/>
        <text x="${padX}" y="${padY - 4}" font-size="11" fill="#64748b">$ par mois (max : $${maxCost.toFixed(2)})</text>
        ${bars}
      </svg>
      <p class="text-muted" style="font-size:12px;margin-top:8px">Survolez les barres pour voir le détail.</p>
    `;
  }

  function renderBreakdown(byType, contentTypes) {
    const types = Object.keys(byType);
    if (!types.length) return '<p class="text-muted">Pas encore de données.</p>';
    const total = Object.values(byType).reduce((a, b) => a + b.cost, 0) || 1;
    const labelByKey = {};
    contentTypes.forEach(ct => { labelByKey[ct.key] = ct.icon + ' ' + ct.label; });
    labelByKey.test = '🧪 Tests';
    labelByKey.unknown = '❓ Inconnu';

    return types.map(t => {
      const d = byType[t];
      const pct = (d.cost / total) * 100;
      return `
        <div class="ai-breakdown-row">
          <div class="ai-breakdown-label">${labelByKey[t] || t}</div>
          <div class="ai-breakdown-bar"><div style="width:${pct.toFixed(1)}%"></div></div>
          <div class="ai-breakdown-value">$${d.cost.toFixed(4)} <small>(${d.calls})</small></div>
        </div>
      `;
    }).join('');
  }

  function renderModelBreakdown(byModel) {
    const ids = Object.keys(byModel);
    if (!ids.length) return '<p class="text-muted">Pas encore de données.</p>';
    const total = Object.values(byModel).reduce((a, b) => a + b.cost, 0) || 1;
    const models = (_aiDashboard && _aiDashboard.available_models) || [];
    const nameById = id => {
      const m = models.find(x => x.id === id);
      return m ? m.name : id;
    };

    return ids.map(id => {
      const d = byModel[id];
      const pct = (d.cost / total) * 100;
      return `
        <div class="ai-breakdown-row">
          <div class="ai-breakdown-label">${esc(nameById(id))}</div>
          <div class="ai-breakdown-bar"><div style="width:${pct.toFixed(1)}%"></div></div>
          <div class="ai-breakdown-value">$${d.cost.toFixed(4)} <small>(${d.calls})</small></div>
        </div>
      `;
    }).join('');
  }

  async function saveAllAiSettings() {
    // 1. Récupération des valeurs
    const models = {
      model_company:    document.getElementById('ai-model-company').value,
      model_service:    document.getElementById('ai-model-service').value,
      model_article:    document.getElementById('ai-model-article').value,
      model_instagram:  document.getElementById('ai-model-instagram').value,
      model_immobilier: document.getElementById('ai-model-immobilier').value
    };
    const max_tokens  = parseInt(document.getElementById('ai-max-tokens').value, 10);
    const temperature = parseFloat(document.getElementById('ai-temperature').value);

    showLoader('Enregistrement…');

    // 2. Sauvegarder paramètres + modèles
    const r1 = await api('saveAiSettings', Object.assign({
      token: state.user.token,
      max_tokens: max_tokens,
      temperature: temperature
    }, models));
    if (!r1.ok) { hideLoader(); return toast('error', r1.error); }

    // 3. Sauvegarder les prompts
    const r2 = await api('updatePrompts', {
      token: state.user.token,
      prompt_company:    document.getElementById('prompt-textarea-prompt_company').value,
      prompt_service:    document.getElementById('prompt-textarea-prompt_service').value,

    });
    hideLoader();
    if (!r2.ok) return toast('error', r2.error);

    toast('success', 'Configuration IA sauvegardée ✅');
  }

  // Bouton "Régénérer PIN + renvoyer email" depuis la fiche admin
  async function adminRegeneratePin(companyId, companyName, companyEmail) {
    const msg = "🔑 Régénérer le code PIN de cette entreprise ?\n\n" +
      "Entreprise : " + companyName + "\n" +
      "Email destinataire : " + companyEmail + "\n\n" +
      "⚠️ L'ancien code PIN sera invalidé immédiatement.\n" +
      "Un nouveau code PIN sera généré et envoyé par email.\n\n" +
      "À utiliser si l'entreprise a perdu son PIN ou n'a jamais reçu l'email initial.\n\n" +
      "Continuer ?";
    if (!confirm(msg)) return;

    showLoader('Régénération du PIN et envoi de l\'email…');
    const r = await api('regenerateCompanyPin', {
      token: state.user.token,
      company_id: companyId
    });
    hideLoader();
    if (!r.ok) return toast('error', r.error || 'Échec de la régénération');

    // Stocke pour proposer WhatsApp dans la même UX que la création
    window._lastCreatedCompany = {
      company_id: companyId,
      email_to: r.email_to,
      email_sent: r.email_sent,
      email_error: r.email_error,
      wa_link: r.wa_link,
      wa_phone_used: r.wa_link ? r.wa_link.split('?')[0].replace('https://wa.me/', '') : ''
    };

    if (r.email_sent) {
      toast('success', 'Nouveau PIN généré et email envoyé ✅');
    } else {
      toast('warning', 'Nouveau PIN généré, mais email non envoyé : ' + (r.email_error || 'erreur'));
    }
    // On ouvre la page de succès pour proposer WhatsApp
    navigate('admin-company-created', { company_id: companyId });
  }


  async function renderAdminLogs() {
    if (!state.user || state.user.type !== 'admin') return navigate('home');

    document.getElementById('main').innerHTML = `
      <div class="dashboard-grid">
        ${adminSidebar('admin-logs')}
        <section>
          <div class="page-header">
            <h1>Journal d'audit</h1>
            <button class="btn btn-secondary btn-sm" onclick="renderAdminLogs()">↻ Rafraîchir</button>
          </div>
          <div class="card" id="logs-zone"><p class="text-muted">Chargement…</p></div>
        </section>
      </div>
    `;

    const r = await api('getAuditLog', { token: state.user.token });
    if (!r.ok) { document.getElementById('logs-zone').innerHTML = `<p>${esc(r.error)}</p>`; return; }

    // Helper : format date courte "14/05/26 16:42"
    const fmtDate = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      const pad = (n) => String(n).padStart(2, '0');
      return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + String(d.getFullYear()).slice(-2) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    };

    // Helper : badge niveau coloré
    const levelBadge = (lvl) => {
      const bg = lvl === 'ERROR' ? '#fee2e2'
              : lvl === 'WARN'  ? '#fef3c7'
              : lvl === 'AI'    ? '#e0e7ff'
              : '#e0f2fe';
      const fg = lvl === 'ERROR' ? '#991b1b'
              : lvl === 'WARN'  ? '#92400e'
              : lvl === 'AI'    ? '#3730a3'
              : '#075985';
      return `<span class="badge" style="background:${bg};color:${fg};font-weight:700">${esc(lvl || '')}</span>`;
    };

    // Helper : chips IA (tokens, modèle, coût) si présents
    const aiExtras = (l, isDesktop) => {
      const cls = isDesktop ? 'audit-extra-desktop' : 'audit-extra';
      const chips = [];
      if (l.tokens_input  !== '' && l.tokens_input  !== undefined && l.tokens_input  !== null) chips.push(`📥 ${esc(String(l.tokens_input))} tok`);
      if (l.tokens_output !== '' && l.tokens_output !== undefined && l.tokens_output !== null) chips.push(`📤 ${esc(String(l.tokens_output))} tok`);
      if (l.model_used) chips.push(`🤖 ${esc(String(l.model_used))}`);
      if (l.cost_estimate_usd !== '' && l.cost_estimate_usd !== undefined && l.cost_estimate_usd !== null && parseFloat(l.cost_estimate_usd) > 0) {
        chips.push(`💰 $${parseFloat(l.cost_estimate_usd).toFixed(6)}`);
      }
      if (!chips.length) return '';
      return `<div class="${cls}">${chips.map(c => `<span>${c}</span>`).join('')}</div>`;
    };

    document.getElementById('logs-zone').innerHTML = `
      <p class="text-muted" style="font-size:13px;margin-top:0">200 dernières entrées du journal (du plus récent au plus ancien).</p>
      <div class="table-wrap"><table class="data">
        <thead><tr><th>Date</th><th>Niveau</th><th>Action</th><th>Détail</th></tr></thead>
        <tbody>
          ${r.logs.map(l => {
            const detailHtml = `
              <span class="audit-detail-text">${esc(l.detail || '')}</span>
              ${aiExtras(l, true)}
            `;
            return `
              <tr>
                <td data-label="Date" class="mono text-xs"><span class="audit-time-short">${fmtDate(l.timestamp)}</span></td>
                <td data-label="Niveau">${levelBadge(l.level)}</td>
                <td data-label="Action" class="mono">${esc(l.action)}</td>
                <td data-label="Détail" class="text-sm">${detailHtml}</td>
              </tr>
            `;
          }).join('')}
          ${r.logs.length === 0 ? '<tr><td colspan="4" style="text-align:center;padding:24px">Aucun log.</td></tr>' : ''}
        </tbody>
      </table></div>
    `;
  }

  function demoHandle(action, data) {
    log('demo', action, data);
    const sleep = () => new Promise(r => setTimeout(r, 200 + Math.random() * 300));
    return sleep().then(() => {
      switch (action) {
        case 'getConfig': return {
          ok: true,
          sectors: ['Restauration & Cafés','Auto & Mécanique','Beauté & Bien-être','BTP & Travaux','Éducation & Formation','Tourisme & Loisirs','Autre'],
          regions: [
            { code: 'MQ', name: 'Martinique', status: 'active' },
            { code: 'GP', name: 'Guadeloupe', status: 'soon' },
            { code: 'GF', name: 'Guyane',     status: 'planned' }
          ]
        };
        case 'registerCompany':
          // En démo : on simule mais on n'écrit nulle part
          return { ok: true, company_id: 'YPI-MQ-9999', pin: '482917', message: 'Démo : aucune donnée n\'a été enregistrée.' };
        case 'loginCompany':
          const c = demoSnapshot.companies.find(x => x.id === data.company_id);
          if (!c) return { ok: false, error: 'Compte démo introuvable' };
          return { ok: true, company: c, token: 'demo-token' };
        case 'getCompanyData':
          return { ok: true, company: demoSnapshot.companies.find(x => x.id === data.company_id) };
        case 'updateCompany':
          const idx = demoSnapshot.companies.findIndex(x => x.id === data.company_id);
          if (idx >= 0) {
            Object.assign(demoSnapshot.companies[idx], data);
            demoSnapshot.companies[idx].last_updated_at = new Date().toISOString();
          }
          return { ok: true };
        case 'changePIN': return { ok: true };
        case 'addServicePage':
          const newPage = {
            id: 'YPI-PAGE-' + String(90000 + Math.floor(Math.random() * 9999)),
            company_id: data.company_id, date_creation: new Date().toISOString(), statut: 'actif',
            titre_service: data.titre_service, description_detaillee: data.description_detaillee,
            image_url: data.image_url || '', chatling_status: 'processed',

            markdown_genere: '### ' + data.titre_service + '\n\n' + data.description_detaillee + '\n\n_(markdown simulé en mode démo)_'
          };
          demoSnapshot.pages.push(newPage);
          return { ok: true, page_id: newPage.id };
        case 'listMyPages':
          return { ok: true, pages: demoSnapshot.pages.filter(p => p.company_id === data.company_id && p.statut === 'actif') };

          const pi = demoSnapshot.pages.findIndex(p => p.id === data.page_id);
          if (pi >= 0) demoSnapshot.pages[pi].statut = 'archive';
          return { ok: true };
        case 'loginAdmin':
          return { ok: true, token: 'demo-admin-token' };
        case 'listCompanies':
          return { ok: true, companies: demoSnapshot.companies };

            { timestamp: '2026-04-22T16:00:00Z', level: 'INFO', action: 'registerCompany', actor: '', detail: 'YPI-MQ-0005 / Lékol Kreyòl' }
          ]};
        default: return { ok: false, error: 'Action démo non simulée : ' + action };
      }
    });
  }

  // ============================================================
  //  BOOT — Affichage instantané, config en arrière-plan
  // ============================================================
  function boot() {
    document.getElementById('footer-version').textContent = APP.version;

    // 1. Charger la session si présente (synchrone, localStorage)
    loadSession();

    // 2. Définir un state.config SYNCHRONE avec le fallback offline
    //    → la home peut être rendue immédiatement, pas d'attente réseau
    state.config = {
      sectors: [
        'Restauration & Cafés','Hôtellerie & Hébergement','Tourisme & Loisirs',
        'BTP & Travaux','Auto & Mécanique','Beauté & Bien-être',
        'Santé & Paramédical','Services à la personne','Commerce & Boutiques',
        'Alimentation & Épicerie','Mode & Vêtements','Artisanat & Création',
        'Numérique & Tech','Conseil & Services pro','Éducation & Formation',
        'Transport & Logistique','Immobilier','Événementiel','Sport & Fitness',
        'Animaux','Autre'
      ],
      regions: [
        { code: 'MQ', name: 'Martinique', status: 'active' },
        { code: 'GP', name: 'Guadeloupe', status: 'soon' },
        { code: 'GF', name: 'Guyane',     status: 'planned' }
      ]
    };

    // 3. NAVIGUER IMMÉDIATEMENT (l'utilisateur voit la page instantanément)
    //    Si l'URL contient un hash (#login-pro, #login-admin, #changelog, etc.),
    //    on respecte ce hash et on navigue vers la vue correspondante.
    const hash = (window.location.hash || '').replace(/^#/, '').trim();
    const allowedHashRoutes = ['login-pro', 'login-admin', 'register', 'changelog', 'home'];
    if (hash && allowedHashRoutes.indexOf(hash) !== -1) {
      // Nettoie le hash après lecture (UX : pas de hash résiduel dans la barre d'adresse)
      try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(e) {}
      navigate(hash);
    } else if (state.user && state.user.type === 'company') navigate('pro-dashboard');
    else if (state.user && state.user.type === 'admin') navigate('admin-dashboard');
    else navigate('home');

    // 4. En ARRIÈRE-PLAN : récupérer la vraie config et rafraîchir si besoin
    api('getConfig').then(cfg => {
      if (!cfg || !cfg.ok) return;
      const regionsChanged   = JSON.stringify(cfg.regions)   !== JSON.stringify(state.config.regions);
      const sectorsChanged   = JSON.stringify(cfg.sectors)   !== JSON.stringify(state.config.sectors);
      state.config = cfg;
      // Re-render silencieusement uniquement si on est sur une page qui dépend de la config
      if (state.view === 'home' && regionsChanged) renderHome();
      if (state.view === 'register' && sectorsChanged) renderRegisterForm();
    }).catch(() => { /* fallback déjà actif, rien à faire */ });

    // 5. Si user en session, rafraîchir ses données en arrière-plan
    //    (le dashboard s'est déjà affiché avec les données du localStorage)
    if (state.user && state.user.type === 'company') {
      api('getCompanyData', { company_id: state.user.id, token: state.user.token }).then(r => {
        if (r && r.ok) {
          state.user.data = r.company;
          saveSession();
          if (state.view === 'pro-dashboard') renderProDashboard();
        } else {
          // Token expiré ou invalide
          clearSession();
          if (state.view !== 'home') navigate('home');
        }
      }).catch(() => { /* on garde les données locales */ });
    }
  }

  // Démarrage immédiat (pas d'async/await au niveau de boot pour éviter le décalage)
  boot();
  </script>
</body>
